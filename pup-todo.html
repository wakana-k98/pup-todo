<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Totoro's To-Do</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap');

:root {
  --gnd:    #E4EED4;
  --srf:    #F4F9EC;
  --txt:    #1C2414;
  --mut:    #627050;
  --acc:    #527848;
  --acn:    #C07838;
  --danger: #A84848;
  --bdr:    rgba(28,36,20,0.12);
  --shd:    0 3px 20px rgba(28,36,20,0.09);
  --rLg:    22px;
  --rSm:    13px;
  --rPill:  100px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background-color: var(--gnd);
  background-image:
    radial-gradient(rgba(255,255,255,0.25) 1px, transparent 1px),
    radial-gradient(rgba(100,130,60,0.06) 2px, transparent 2px);
  background-size: 22px 22px, 44px 44px;
  background-position: 0 0, 11px 11px;
  color: var(--txt);
  font-family: 'Nunito', system-ui, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 1.1rem 1rem 2.5rem;
}

.app {
  width: 100%;
  max-width: 400px;
  display: flex;
  flex-direction: column;
  gap: 0.85rem;
}

/* ── Header ── */
.hdr { display: flex; align-items: center; justify-content: space-between; }
.hdr h1 { font-size: 1.65rem; font-weight: 900; letter-spacing: -0.04em; line-height: 1; }

.acorn-badge {
  display: flex; align-items: center; gap: 0.28rem;
  background: var(--srf); border: 1.5px solid var(--bdr);
  border-radius: var(--rPill); padding: 0.28rem 0.65rem;
  font-family: 'Space Mono', monospace; font-size: 0.75rem; font-weight: 700;
  box-shadow: var(--shd);
}

/* ── Input ── */
.input-row { display: flex; gap: 0.45rem; }
.task-input {
  flex: 1; background: var(--srf); border: 1.5px solid var(--bdr);
  border-radius: var(--rPill); padding: 0.62rem 1.05rem;
  font-family: 'Nunito', sans-serif; font-size: 0.9rem; font-weight: 600;
  color: var(--txt); outline: none; box-shadow: var(--shd);
  transition: border-color 0.15s;
}
.task-input::placeholder { color: var(--mut); font-weight: 400; }
.task-input:focus { border-color: var(--acc); }

.btn-add {
  background: var(--txt); color: var(--gnd); border: none;
  border-radius: var(--rPill); padding: 0.62rem 0.95rem;
  font-family: 'Nunito', sans-serif; font-size: 0.85rem; font-weight: 800;
  cursor: pointer; box-shadow: var(--shd); transition: transform 0.1s, opacity 0.12s;
  white-space: nowrap;
}
.btn-add:hover { opacity: 0.82; }
.btn-add:active { transform: scale(0.93); }

/* ── Task list ── */
.task-list { display: flex; flex-direction: column; gap: 0.4rem; }
.task-item {
  background: var(--srf); border: 1.5px solid var(--bdr); border-radius: var(--rSm);
  padding: 0.65rem 0.85rem; display: flex; align-items: center; gap: 0.55rem;
  box-shadow: 0 2px 7px rgba(28,36,20,0.07); transition: opacity 0.22s;
}
.task-item.done { opacity: 0.4; }
.task-item.done .task-lbl { text-decoration: line-through; color: var(--mut); }
.chk-btn {
  width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--bdr);
  background: transparent; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.62rem; color: white; font-weight: 800;
  transition: background 0.15s, border-color 0.15s;
}
.chk-btn:hover { border-color: var(--acc); }
.task-item.done .chk-btn { background: var(--acc); border-color: var(--acc); }
.task-lbl { flex: 1; font-size: 0.88rem; font-weight: 600; color: var(--txt); word-break: break-word; }
.del-btn {
  background: none; border: none; cursor: pointer; color: var(--mut);
  font-size: 1rem; line-height: 1; padding: 0.1rem; opacity: 0.28;
  transition: opacity 0.12s, color 0.12s; flex-shrink: 0;
}
.del-btn:hover { opacity: 1; color: var(--danger); }
.empty-state { text-align: center; padding: 1.25rem 0; color: var(--mut); font-size: 0.83rem; font-weight: 600; }

/* ── Stage card ── */
.stage-card { background: var(--srf); border: 1.5px solid var(--bdr); border-radius: var(--rLg); overflow: hidden; box-shadow: var(--shd); }

/* Reward strip */
.reward-strip {
  display: none; flex-direction: column; align-items: center; gap: 0.5rem;
  padding: 0.7rem 1rem; border-bottom: 1.5px solid var(--bdr); background: var(--gnd);
}
.reward-strip.on { display: flex; }
.reward-lbl { font-family: 'Space Mono', monospace; font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--mut); }
.reward-btns { display: flex; gap: 0.45rem; }
.reward-btn {
  background: var(--srf); border: 1.5px solid var(--bdr); border-radius: var(--rPill);
  padding: 0.38rem 0.78rem; font-family: 'Nunito', sans-serif; font-size: 0.8rem;
  font-weight: 700; cursor: pointer; transition: background 0.12s, border-color 0.12s, transform 0.1s;
}
.reward-btn:hover { background: var(--acc); border-color: var(--acc); color: white; }
.reward-btn:active { transform: scale(0.93); }

/* ── Walking stage ── */
.totoro-stage {
  position: relative; height: 185px; overflow: hidden;
  background: linear-gradient(180deg, #DFF0D0 0%, #C8DC9C 72%, #A8BC72 100%);
}

/* Grass tufts on ground */
.totoro-stage::before {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 28px;
  background:
    repeating-linear-gradient(90deg, transparent 0, transparent 18px,
      rgba(80,110,40,0.18) 18px, rgba(80,110,40,0.18) 19px);
  pointer-events: none;
}
/* Dappled light on ground */
.totoro-stage::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 56px;
  background: radial-gradient(ellipse 40px 20px at 80px 50px, rgba(255,255,255,0.12) 0%, transparent 100%),
              radial-gradient(ellipse 30px 16px at 230px 45px, rgba(255,255,255,0.10) 0%, transparent 100%),
              radial-gradient(ellipse 50px 22px at 340px 52px, rgba(255,255,255,0.08) 0%, transparent 100%);
  pointer-events: none;
}

/* Totoro position wrapper — JS moves left */
#tot-pos { position: absolute; bottom: 18px; left: 16px; }

/* ── Totoro animations ── */

@keyframes waddle {
  0%,100% { transform: rotate(-4.5deg) translateY(0); }
  25%      { transform: rotate(-2deg) translateY(-9px); }
  50%      { transform: rotate(4.5deg) translateY(0); }
  75%      { transform: rotate(2deg) translateY(-9px); }
}
@keyframes sit-breathe {
  0%,100% { transform: scale(1); }
  50%      { transform: scale(1.025) translateY(-2px); }
}
@keyframes sleep-tilt {
  0%   { transform: rotate(0deg) translateX(0); }
  100% { transform: rotate(78deg) translateX(38px) translateY(10px); }
}
@keyframes sleep-breathe {
  0%,100% { transform: rotate(78deg) translateX(38px) translateY(10px) scale(1); }
  50%      { transform: rotate(78deg) translateX(38px) translateY(10px) scale(1.035); }
}
@keyframes roar-shake {
  0%,100% { transform: scale(1) rotate(0deg); }
  20%      { transform: scale(1.08) rotate(-3deg); }
  40%      { transform: scale(1.10) rotate(3deg); }
  60%      { transform: scale(1.08) rotate(-2deg); }
  80%      { transform: scale(1.06) rotate(2deg); }
}
@keyframes eat-nod {
  0%,100% { transform: rotate(0deg) translateY(0); }
  30%      { transform: rotate(-10deg) translateY(-4px); }
  55%      { transform: rotate(-7deg) translateY(-2px); }
}
@keyframes pet-sway {
  0%,100% { transform: rotate(0deg); }
  30%      { transform: rotate(-5deg); }
  70%      { transform: rotate(5deg); }
}
@keyframes blink {
  0%,88%,100% { transform: scaleY(1); }
  92%          { transform: scaleY(0.08); }
}
@keyframes zzz-rise {
  0%   { opacity: 0; transform: translate(0,0) scale(0.5); }
  15%  { opacity: 1; }
  85%  { opacity: 0.9; }
  100% { opacity: 0; transform: translate(18px,-38px) scale(1.1); }
}
@keyframes heart-rise {
  0%   { opacity: 0; transform: translateY(0) scale(0.6); }
  18%  { opacity: 1; }
  80%  { opacity: 1; }
  100% { opacity: 0; transform: translateY(-36px) scale(1.2); }
}
@keyframes acorn-arc {
  0%   { opacity: 0; transform: translate(0,0) rotate(0deg); }
  20%  { opacity: 1; }
  50%  { transform: translate(-15px,-25px) rotate(-30deg); }
  80%  { opacity: 1; }
  100% { opacity: 0; transform: translate(-30px,-5px) rotate(-60deg); }
}

/* State classes on #tot-pos */
.walking  #tot-inner { animation: waddle       0.42s ease-in-out infinite; }
.sitting  #tot-inner { animation: sit-breathe  3.2s ease-in-out infinite; }
.sleeping #tot-inner { animation: sleep-tilt   1.1s ease-in-out forwards; }
.sleep-deep #tot-inner { animation: sleep-breathe 2.8s ease-in-out infinite; }
.eating   #tot-inner { animation: eat-nod      0.6s ease-in-out 3; }
.petting  #tot-inner { animation: pet-sway     1.4s ease-in-out 2; }
.playing  #tot-inner { animation: roar-shake   0.45s ease-out 3; }

/* Flip direction */
.facing-left #tot-svg { transform: scaleX(-1); }

/* Eye blink */
#g-eyes { transform-box: fill-box; transform-origin: 50% 50%; }
.walking #g-eyes { animation: blink 5s ease-in-out infinite; }
.sitting #g-eyes { animation: blink 4s ease-in-out infinite; }

/* Blush (petting) */
#g-blush { opacity: 0; transition: opacity 0.5s; }
.petting #g-blush { opacity: 1; }

/* Floating overlays — positioned in stage, not inside SVG so they don't flip */
.float-overlay {
  position: absolute; pointer-events: none;
  font-family: sans-serif; user-select: none;
  opacity: 0;
}
#flt-zzz1 { font-size: 15px; top: 28px; }
#flt-zzz2 { font-size: 12px; top: 18px; }
#flt-zzz3 { font-size: 9px;  top: 12px; }
#flt-heart { font-size: 18px; top: 16px; }
#flt-acorn { font-size: 18px; top: 16px; }

.sleep-deep #flt-zzz1 { animation: zzz-rise 2.2s ease-out 0s   infinite; }
.sleep-deep #flt-zzz2 { animation: zzz-rise 2.2s ease-out 0.9s infinite; }
.sleep-deep #flt-zzz3 { animation: zzz-rise 2.2s ease-out 1.7s infinite; }
.petting    #flt-heart { animation: heart-rise 1.9s ease-out forwards; }
.eating     #flt-acorn { animation: acorn-arc  1.6s ease-out forwards; }

/* Focus */
:focus-visible { outline: 2.5px solid var(--acc); outline-offset: 2px; border-radius: 4px; }

@media (prefers-reduced-motion: reduce) {
  #tot-inner, #g-eyes, .float-overlay { animation: none !important; }
  .petting #g-blush { opacity: 1; }
}
</style>
</head>
<body>
<div class="app">

  <header class="hdr">
    <h1>Totoro's To-Do</h1>
    <div class="acorn-badge" aria-live="polite" aria-label="Acorns earned">
      🌰 <span id="acorn-num">0</span>
    </div>
  </header>

  <div class="input-row">
    <input type="text" class="task-input" id="task-input"
           placeholder="Add something to do…" autocomplete="off" aria-label="New task">
    <button class="btn-add" id="btn-add">+ Add</button>
  </div>

  <div class="task-list" id="task-list" aria-live="polite"></div>

  <!-- Totoro card -->
  <div class="stage-card">

    <div class="reward-strip" id="reward-strip" role="region" aria-label="Reward Totoro">
      <span class="reward-lbl" id="reward-lbl">✨ Task done! How should Totoro celebrate?</span>
      <div class="reward-btns">
        <button class="reward-btn" id="btn-acorn">🌰 Acorn</button>
        <button class="reward-btn" id="btn-pet">✋ Head Pat</button>
        <button class="reward-btn" id="btn-roar">🌪️ ROAR!</button>
      </div>
    </div>

    <div class="totoro-stage" id="tot-stage">

      <!-- Floating overlays (outside SVG so they don't get flipped) -->
      <span class="float-overlay" id="flt-zzz1">Z</span>
      <span class="float-overlay" id="flt-zzz2">Z</span>
      <span class="float-overlay" id="flt-zzz3">z</span>
      <span class="float-overlay" id="flt-heart">💚</span>
      <span class="float-overlay" id="flt-acorn">🌰</span>

      <div id="tot-pos">
        <div id="tot-inner">
          <svg id="tot-svg"
               viewBox="0 0 155 195"
               width="118" height="149"
               xmlns="http://www.w3.org/2000/svg"
               overflow="visible"
               role="img" aria-label="Totoro">

            <!-- ── Left ear ── -->
            <polygon points="50,62 35,6 70,46" fill="#687870"/>
            <polygon points="52,60 40,14 67,45" fill="#9A9A88"/>

            <!-- ── Right ear ── -->
            <polygon points="105,62 120,6 85,46" fill="#687870"/>
            <polygon points="103,60 115,14 88,45" fill="#9A9A88"/>

            <!-- ── Main body (grey) ── -->
            <path d="M 18,108
                     C 18,48  137,48  137,108
                     C 137,155 120,178 77.5,180
                     C 35,178  18,155  18,108 Z"
                  fill="#6A7870"/>

            <!-- Body edge highlight (subtle lighter rim) -->
            <path d="M 22,108
                     C 22,54 133,54 133,108
                     C 133,152 118,174 77.5,176
                     C 37,174  22,152  22,108 Z"
                  fill="none" stroke="#7A8A80" stroke-width="1.5" opacity="0.4"/>

            <!-- ── Belly (cream) ── -->
            <ellipse cx="77.5" cy="138" rx="44" ry="38" fill="#D4E8B0"/>

            <!-- Belly shading at top edge -->
            <ellipse cx="77.5" cy="104" rx="42" ry="12" fill="#C4D8A0" opacity="0.4"/>

            <!-- ── Belly crescent markings (7 arches in 3 rows) ── -->
            <!-- Row 1: 2 arches -->
            <path d="M 57,112 Q 65,105 73,112" stroke="#4A5A48" stroke-width="4" fill="none" stroke-linecap="round"/>
            <path d="M 82,112 Q 90,105 98,112" stroke="#4A5A48" stroke-width="4" fill="none" stroke-linecap="round"/>
            <!-- Row 2: 3 arches -->
            <path d="M 46,128 Q 54,121 62,128" stroke="#4A5A48" stroke-width="4" fill="none" stroke-linecap="round"/>
            <path d="M 68,130 Q 77.5,122 87,130" stroke="#4A5A48" stroke-width="4" fill="none" stroke-linecap="round"/>
            <path d="M 93,128 Q 101,121 109,128" stroke="#4A5A48" stroke-width="4" fill="none" stroke-linecap="round"/>
            <!-- Row 3: 2 arches -->
            <path d="M 57,145 Q 65,138 73,145" stroke="#4A5A48" stroke-width="3.5" fill="none" stroke-linecap="round"/>
            <path d="M 82,145 Q 90,138 98,145" stroke="#4A5A48" stroke-width="3.5" fill="none" stroke-linecap="round"/>

            <!-- ── Eyes open ── -->
            <g id="g-eyes">
              <!-- Eye whites (large, round) -->
              <circle cx="57"  cy="83" r="15.5" fill="#F0F4EE"/>
              <circle cx="98"  cy="83" r="15.5" fill="#F0F4EE"/>
              <!-- Dark grey outer ring -->
              <circle cx="57"  cy="83" r="15.5" fill="none" stroke="#3A4438" stroke-width="2"/>
              <circle cx="98"  cy="83" r="15.5" fill="none" stroke="#3A4438" stroke-width="2"/>
              <!-- Pupils -->
              <circle cx="57"  cy="84" r="10" fill="#1C1C10"/>
              <circle cx="98"  cy="84" r="10" fill="#1C1C10"/>
              <!-- Primary shine -->
              <circle cx="61"  cy="78" r="4"  fill="white"/>
              <circle cx="102" cy="78" r="4"  fill="white"/>
              <!-- Secondary shine -->
              <circle cx="55"  cy="87" r="2"  fill="white" opacity="0.55"/>
              <circle cx="96"  cy="87" r="2"  fill="white" opacity="0.55"/>
            </g>

            <!-- ── Eyes closed (sleep / petting) — hidden ── -->
            <g id="g-eyes-closed" style="display:none">
              <path d="M 43,83 Q 57,95 71,83"
                    stroke="#3A4438" stroke-width="4" fill="none" stroke-linecap="round"/>
              <path d="M 84,83 Q 98,95 112,83"
                    stroke="#3A4438" stroke-width="4" fill="none" stroke-linecap="round"/>
            </g>

            <!-- ── Nose ── -->
            <ellipse cx="77.5" cy="100" rx="5.5" ry="4" fill="#2A2E28"/>

            <!-- ── Mouth: calm (default) ── -->
            <g id="g-mouth-calm">
              <path d="M 66,109 Q 77.5,116 89,109"
                    stroke="#2A2E28" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            </g>

            <!-- ── Mouth: grin / eating ── -->
            <g id="g-mouth-grin" style="display:none">
              <path d="M 60,107 Q 77.5,122 95,107 L 95,112 Q 77.5,128 60,112 Z"
                    fill="#1C1C10" opacity="0.92"/>
              <!-- Teeth row -->
              <path d="M 62,109 Q 77.5,122 93,109"
                    stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.85"/>
            </g>

            <!-- ── Mouth: ROAR (very wide) ── -->
            <g id="g-mouth-roar" style="display:none">
              <path d="M 52,104 Q 77.5,130 103,104 L 103,115 Q 77.5,142 52,115 Z"
                    fill="#181808" opacity="0.95"/>
              <!-- Top teeth suggestion -->
              <path d="M 55,107 Q 77.5,128 100,107"
                    stroke="white" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.8"/>
            </g>

            <!-- ── Whiskers ── -->
            <g stroke="rgba(220,215,195,0.48)" stroke-width="1.3" stroke-linecap="round">
              <line x1="10"  y1="93"  x2="52"  y2="97"/>
              <line x1="7"   y1="100" x2="50"  y2="101"/>
              <line x1="10"  y1="107" x2="52"  y2="105"/>
              <line x1="12"  y1="114" x2="52"  y2="109"/>
              <line x1="145" y1="93"  x2="103" y2="97"/>
              <line x1="148" y1="100" x2="105" y2="101"/>
              <line x1="145" y1="107" x2="103" y2="105"/>
              <line x1="143" y1="114" x2="103" y2="109"/>
            </g>

            <!-- ── Arms: normal ── -->
            <g id="g-arms-normal">
              <ellipse cx="20" cy="122" rx="16" ry="10" fill="#5E6E68" transform="rotate(-35,20,122)"/>
              <!-- Left claws -->
              <line x1="8"   y1="128" x2="4"   y2="135" stroke="#2A3028" stroke-width="2.5" stroke-linecap="round"/>
              <line x1="12"  y1="131" x2="9"   y2="138" stroke="#2A3028" stroke-width="2.5" stroke-linecap="round"/>
              <line x1="16"  y1="133" x2="14"  y2="140" stroke="#2A3028" stroke-width="2.5" stroke-linecap="round"/>
              <ellipse cx="135" cy="122" rx="16" ry="10" fill="#5E6E68" transform="rotate(35,135,122)"/>
              <!-- Right claws -->
              <line x1="147" y1="128" x2="151" y2="135" stroke="#2A3028" stroke-width="2.5" stroke-linecap="round"/>
              <line x1="143" y1="131" x2="146" y2="138" stroke="#2A3028" stroke-width="2.5" stroke-linecap="round"/>
              <line x1="139" y1="133" x2="141" y2="140" stroke="#2A3028" stroke-width="2.5" stroke-linecap="round"/>
            </g>

            <!-- ── Arms: raised (ROAR / playing) — hidden ── -->
            <g id="g-arms-raised" style="display:none">
              <ellipse cx="16" cy="88" rx="16" ry="10" fill="#5E6E68" transform="rotate(-82,16,88)"/>
              <line x1="8"   y1="78" x2="3"   y2="72" stroke="#2A3028" stroke-width="2.5" stroke-linecap="round"/>
              <line x1="12"  y1="75" x2="8"   y2="69" stroke="#2A3028" stroke-width="2.5" stroke-linecap="round"/>
              <line x1="16"  y1="73" x2="13"  y2="67" stroke="#2A3028" stroke-width="2.5" stroke-linecap="round"/>
              <ellipse cx="139" cy="88" rx="16" ry="10" fill="#5E6E68" transform="rotate(82,139,88)"/>
              <line x1="147" y1="78" x2="152" y2="72" stroke="#2A3028" stroke-width="2.5" stroke-linecap="round"/>
              <line x1="143" y1="75" x2="147" y2="69" stroke="#2A3028" stroke-width="2.5" stroke-linecap="round"/>
              <line x1="139" y1="73" x2="142" y2="67" stroke="#2A3028" stroke-width="2.5" stroke-linecap="round"/>
            </g>

            <!-- ── Feet ── -->
            <ellipse cx="54"  cy="174" rx="24" ry="13" fill="#575E58"/>
            <ellipse cx="101" cy="174" rx="24" ry="13" fill="#575E58"/>
            <!-- Left foot claws (5) -->
            <line x1="36" y1="181" x2="32" y2="189" stroke="#252820" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="43" y1="184" x2="40" y2="192" stroke="#252820" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="52" y1="186" x2="50" y2="194" stroke="#252820" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="61" y1="184" x2="60" y2="192" stroke="#252820" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="69" y1="181" x2="70" y2="189" stroke="#252820" stroke-width="2.5" stroke-linecap="round"/>
            <!-- Right foot claws (5) -->
            <line x1="83"  y1="181" x2="80"  y2="189" stroke="#252820" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="90"  y1="184" x2="88"  y2="192" stroke="#252820" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="99"  y1="186" x2="99"  y2="194" stroke="#252820" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="108" y1="184" x2="109" y2="192" stroke="#252820" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="116" y1="181" x2="119" y2="189" stroke="#252820" stroke-width="2.5" stroke-linecap="round"/>

            <!-- ── Blush (petting) ── -->
            <g id="g-blush">
              <ellipse cx="34"  cy="100" rx="13" ry="8" fill="#E09090" opacity="0.28"/>
              <ellipse cx="121" cy="100" rx="13" ry="8" fill="#E09090" opacity="0.28"/>
            </g>

          </svg>
        </div>
      </div>
    </div><!-- /totoro-stage -->
  </div><!-- /stage-card -->

</div>

<script>
(function () {
  'use strict';

  // ── Persistence ────────────────────────────────────────────────────────
  var tasks      = [];
  var acornCount = 0;
  function load() {
    try {
      tasks      = JSON.parse(localStorage.getItem('tot-tasks') || '[]');
      acornCount = parseInt(localStorage.getItem('tot-acorns') || '0', 10);
    } catch (_) { tasks = []; acornCount = 0; }
  }
  function save() {
    localStorage.setItem('tot-tasks',  JSON.stringify(tasks));
    localStorage.setItem('tot-acorns', String(acornCount));
  }

  // ── Walk engine ────────────────────────────────────────────────────────
  var catState  = 'walking';
  var catX      = 18;
  var catDir    = 1;
  var catSpeed  = 0.75; // Totoro is slow and dignified
  var rafId     = null;
  var stateTimer     = null;
  var idleTimer      = null;
  var deepSleepTimer = null;

  function startWalk() {
    resetIdleTimer();
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(step);
  }

  function step() {
    if (catState !== 'walking') return;
    var stage  = document.getElementById('tot-stage');
    var maxX   = stage.offsetWidth - 126; // totoro render width + margin
    catX += catDir * catSpeed;
    if (catX >= maxX) { catX = maxX; catDir = -1; applyDir(); }
    if (catX <= 0)    { catX = 0;    catDir =  1; applyDir(); }
    document.getElementById('tot-pos').style.left = catX + 'px';
    rafId = requestAnimationFrame(step);
  }

  function applyDir() {
    var pos = document.getElementById('tot-pos');
    if (catDir === -1) pos.classList.add('facing-left');
    else               pos.classList.remove('facing-left');
    // Brief sit pause when turning (Totoro is thoughtful)
    if (catState === 'walking') {
      catState = 'sitting';
      setTimeout(function () {
        if (catState === 'sitting') {
          catState = 'walking';
          applyStateClass();
          startWalk();
        }
      }, 900 + Math.random() * 600);
      applyStateClass();
    }
  }

  // ── Idle / sleep system ────────────────────────────────────────────────
  function resetIdleTimer() {
    clearTimeout(idleTimer);
    clearTimeout(deepSleepTimer);
    // If currently sleeping, wake up
    if (catState === 'sleeping' || catState === 'sleep-deep') wakeUp();
    idleTimer = setTimeout(sitDown, 40000);           // 40s → sit
  }

  function sitDown() {
    if (catState !== 'walking') return;
    cancelAnimationFrame(rafId);
    catState = 'sitting';
    applyStateClass();
    deepSleepTimer = setTimeout(fallAsleep, 25000);   // 25s more → sleep
  }

  function fallAsleep() {
    if (catState !== 'sitting') return;
    catState = 'sleeping';
    applyStateClass();
    setFace('sleep');
    // After tilt animation, transition to deep sleep breathing
    setTimeout(function () {
      if (catState === 'sleeping') {
        catState = 'sleep-deep';
        applyStateClass();
      }
    }, 1300);
  }

  function wakeUp() {
    catState = 'walking';
    applyStateClass();
    setFace('default');
    startWalk();
  }

  // ── State machine ──────────────────────────────────────────────────────
  function applyStateClass() {
    var pos = document.getElementById('tot-pos');
    var wasLeft = pos.classList.contains('facing-left');
    pos.className = catState + (wasLeft ? ' facing-left' : '');
    // Sync float overlays position when sleeping
    syncFloatOverlays();
  }

  function syncFloatOverlays() {
    var pos = document.getElementById('tot-pos');
    var rect = pos.getBoundingClientRect();
    var stageRect = document.getElementById('tot-stage').getBoundingClientRect();
    var overlayX = rect.left - stageRect.left + 95; // right of Totoro head
    ['flt-zzz1','flt-zzz2','flt-zzz3','flt-heart','flt-acorn'].forEach(function (id) {
      document.getElementById(id).style.left = overlayX + 'px';
    });
  }

  // ── Reward system ──────────────────────────────────────────────────────
  var pendingRewards = 0;

  function updateRewardUI() {
    var strip = document.getElementById('reward-strip');
    if (pendingRewards > 0) {
      strip.classList.add('on');
      var label = pendingRewards > 1
        ? '✨ ' + pendingRewards + ' tasks done! Pick a reward for Totoro'
        : '✨ Task done! How should Totoro celebrate?';
      document.getElementById('reward-lbl').textContent = label;
    } else {
      strip.classList.remove('on');
    }
  }

  function claimReward(type) {
    pendingRewards = Math.max(0, pendingRewards - 1);
    resetIdleTimer();
    if (type === 'acorn') doAcorn();
    else if (type === 'pet') doPet();
    else if (type === 'roar') doRoar();
  }

  function afterAnim(delay, next) {
    clearTimeout(stateTimer);
    stateTimer = setTimeout(next, delay);
  }

  function doAcorn() {
    catState = 'eating'; applyStateClass();
    setFace('grin');
    syncFloatOverlays();
    afterAnim(2800, function () {
      setFace('default');
      finishReward();
    });
  }

  function doPet() {
    catState = 'petting'; applyStateClass();
    setFace('sleep'); // eyes closed = content
    syncFloatOverlays();
    afterAnim(3200, function () {
      setFace('default');
      finishReward();
    });
  }

  function doRoar() {
    catState = 'playing'; applyStateClass();
    setFace('roar');
    syncFloatOverlays();
    afterAnim(1800, function () {
      setFace('default');
      finishReward();
    });
  }

  function finishReward() {
    updateRewardUI();
    if (pendingRewards > 0) {
      catState = 'sitting'; applyStateClass();
    } else {
      catState = 'walking'; applyStateClass();
      startWalk();
    }
  }

  // ── Face presets ──────────────────────────────────────────────────────
  function setFace(preset) {
    var eyesOpen   = document.getElementById('g-eyes');
    var eyesClosed = document.getElementById('g-eyes-closed');
    var mCalm      = document.getElementById('g-mouth-calm');
    var mGrin      = document.getElementById('g-mouth-grin');
    var mRoar      = document.getElementById('g-mouth-roar');
    var armsNorm   = document.getElementById('g-arms-normal');
    var armsRaised = document.getElementById('g-arms-raised');

    // Reset
    eyesOpen.style.display   = ''; eyesClosed.style.display = 'none';
    mCalm.style.display      = ''; mGrin.style.display      = 'none';
    mRoar.style.display      = 'none';
    armsNorm.style.display   = ''; armsRaised.style.display = 'none';

    if (preset === 'grin') {
      mCalm.style.display = 'none'; mGrin.style.display = '';
    } else if (preset === 'roar') {
      eyesOpen.style.display = ''; // eyes wide open (default, just bigger impression)
      mCalm.style.display = 'none'; mRoar.style.display = '';
      armsNorm.style.display = 'none'; armsRaised.style.display = '';
    } else if (preset === 'sleep') {
      eyesOpen.style.display = 'none'; eyesClosed.style.display = '';
      mCalm.style.display = '';
    }
  }

  // ── Task operations ───────────────────────────────────────────────────
  function addTask(text) {
    text = text.trim();
    if (!text) return;
    tasks.unshift({ id: Date.now(), text: text, done: false });
    save(); render();
    resetIdleTimer();
  }

  function completeTask(id) {
    var t = tasks.find(function (x) { return x.id === id; });
    if (!t || t.done) return;
    t.done = true; acornCount++;
    pendingRewards++;
    save();
    cancelAnimationFrame(rafId);
    catState = 'sitting'; applyStateClass();
    updateRewardUI(); render();
    resetIdleTimer();
  }

  function undoTask(id) {
    var t = tasks.find(function (x) { return x.id === id; });
    if (!t) return;
    t.done = !t.done; save(); render();
  }

  function removeTask(id) {
    tasks = tasks.filter(function (x) { return x.id !== id; });
    save(); render();
  }

  // ── Render ────────────────────────────────────────────────────────────
  function render() {
    document.getElementById('acorn-num').textContent = acornCount;
    var listEl = document.getElementById('task-list');
    if (!tasks.length) {
      listEl.innerHTML = '<div class="empty-state">No tasks yet — add one for Totoro!</div>';
      return;
    }
    listEl.innerHTML = tasks.map(function (t) {
      var lbl = t.done ? 'Undo' : 'Complete';
      return (
        '<div class="task-item' + (t.done ? ' done' : '') + '">' +
          '<button class="chk-btn" onclick="tot.check(' + t.id + ')" aria-label="' + lbl + ' task">' +
            (t.done ? '✓' : '') + '</button>' +
          '<span class="task-lbl">' + esc(t.text) + '</span>' +
          '<button class="del-btn" onclick="tot.del(' + t.id + ')" aria-label="Delete task">\xD7</button>' +
        '</div>'
      );
    }).join('');
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // ── Events ────────────────────────────────────────────────────────────
  var inp = document.getElementById('task-input');
  function submit() {
    var v = inp.value.trim();
    if (v) { addTask(v); inp.value = ''; }
    inp.focus();
  }
  inp.addEventListener('keydown', function (e) { if (e.key === 'Enter') submit(); });
  document.getElementById('btn-add').addEventListener('click', submit);
  document.getElementById('btn-acorn').addEventListener('click', function () { claimReward('acorn'); });
  document.getElementById('btn-pet').addEventListener('click',   function () { claimReward('pet');   });
  document.getElementById('btn-roar').addEventListener('click',  function () { claimReward('roar');  });

  // Wake Totoro on any click in the stage
  document.getElementById('tot-stage').addEventListener('click', function () {
    if (catState === 'sleeping' || catState === 'sleep-deep') wakeUp();
  });

  window.tot = {
    check: function (id) {
      var t = tasks.find(function (x) { return x.id === id; });
      if (!t) return;
      if (t.done) undoTask(id); else completeTask(id);
    },
    del: removeTask
  };

  // ── Boot ──────────────────────────────────────────────────────────────
  load(); render();
  applyStateClass();
  startWalk();
}());
</script>
</body>
</html>
