<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghibli Desktop Pet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Nunito:wght@400;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;}
body{font-family:'Nunito',sans-serif;background:#87C1D8;}

/* ─── CSS vars per character ─────────────────────────────────────── */
body[data-char="totoro"]{--acc:#527848;--acc2:#8AB070;--txt:#2A3428;--sub:#6A7860;--card:rgba(250,253,245,.97);--brd:#C8DEB8;--srf:#F4F9EC;}
body[data-char="chibi"] {--acc:#B88820;--acc2:#D4AA40;--txt:#3A2818;--sub:#7A5828;--card:rgba(255,250,240,.97);--brd:#E8D8A0;--srf:#FDF6EC;}
body[data-char="jiji"]  {--acc:#7060A0;--acc2:#A090C8;--txt:#1A1828;--sub:#6050A0;--card:rgba(248,246,255,.97);--brd:#C8C0E4;--srf:#F4F2FC;}

/* ─── SELECTION SCREEN ───────────────────────────────────────────── */
#sel-screen{position:fixed;inset:0;z-index:200;background:linear-gradient(168deg,#B8D8F0 0%,#D4EAB8 55%,#C8E4A0 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;overflow:hidden;}
#sel-screen.hide{animation:fade-out .45s ease forwards;pointer-events:none;}
@keyframes fade-out{to{opacity:0;transform:scale(.97);}}
.sel-title{font-family:'Comfortaa',cursive;font-size:clamp(20px,5vw,30px);font-weight:700;color:#2A4828;text-align:center;line-height:1.4;}
.sel-title em{color:#527848;font-style:normal;}
.sel-sub{font-size:13px;color:#4A6840;text-align:center;font-style:italic;margin-top:-12px;}
.sel-cards{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;padding:0 12px;}
.sel-card{background:rgba(255,255,255,.86);backdrop-filter:blur(8px);border:2px solid rgba(255,255,255,.9);border-radius:22px;padding:14px 12px 12px;min-width:110px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;box-shadow:0 6px 24px rgba(40,80,30,.12);animation:card-float 3s ease-in-out infinite;transition:transform .2s,box-shadow .2s;}
.sel-card:nth-child(2){animation-delay:-1s;}.sel-card:nth-child(3){animation-delay:-2s;}
.sel-card:hover{animation-play-state:paused;transform:translateY(-8px) scale(1.06)!important;box-shadow:0 18px 44px rgba(40,80,30,.24);}
@keyframes card-float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.sel-preview{background-repeat:no-repeat;background-size:contain;background-position:center bottom;mix-blend-mode:multiply;}
.sel-card-name{font-family:'Comfortaa',cursive;font-size:14px;font-weight:700;color:#2A3428;}
.sel-card-role{font-size:11px;color:#6A8060;text-align:center;line-height:1.4;}
.sparkle{position:absolute;width:7px;height:7px;border-radius:50%;background:radial-gradient(circle,#FFE860,#FFCC00);animation:sp-drift var(--d,4s) var(--dl,0s) ease-in-out infinite;opacity:0;}
@keyframes sp-drift{0%{opacity:0;transform:translateY(0) scale(.4);}30%{opacity:.85;transform:translateY(-22px) scale(1);}70%{opacity:.5;transform:translateY(-52px) scale(.8);}100%{opacity:0;transform:translateY(-80px) scale(.2);}}

/* ─── DESKTOP BACKGROUND ─────────────────────────────────────────── */
#desktop-bg{position:fixed;inset:0;z-index:0;}
body[data-char="totoro"] #desktop-bg{background:linear-gradient(180deg,#78B8D8 0%,#A8CDE4 28%,#C4E0C4 60%,#D8ECC8 82%);}
body[data-char="chibi"]  #desktop-bg{background:linear-gradient(180deg,#E8C87A 0%,#EEDE9A 28%,#E8EAC0 60%,#D8ECC0 82%);}
body[data-char="jiji"]   #desktop-bg{background:linear-gradient(180deg,#0E0C22 0%,#201C3E 28%,#3C3268 60%,#605090 82%);}

/* Ground strip */
#ground{position:fixed;bottom:0;left:0;right:0;height:54px;z-index:1;pointer-events:none;}
body[data-char="totoro"] #ground{background:linear-gradient(180deg,#4A8038 0%,#3A6028 100%);}
body[data-char="chibi"]  #ground{background:linear-gradient(180deg,#7AAA40 0%,#5A8030 100%);}
body[data-char="jiji"]   #ground{background:linear-gradient(180deg,#1A1830 0%,#100E20 100%);}
#ground::before{content:'';position:absolute;top:-5px;left:0;right:0;height:10px;background:inherit;filter:blur(3px);opacity:.6;}

/* CSS clouds */
.bg-cloud{position:absolute;width:120px;height:40px;background:rgba(255,255,255,.78);border-radius:60px;pointer-events:none;animation:cloud-drift var(--d,42s) var(--dl,0s) linear infinite;}
.bg-cloud::before{content:'';position:absolute;width:55px;height:55px;background:inherit;border-radius:50%;top:-26px;left:18px;}
.bg-cloud::after{content:'';position:absolute;width:36px;height:36px;background:inherit;border-radius:50%;top:-14px;left:66px;}
@keyframes cloud-drift{from{transform:translateX(-220px);}to{transform:translateX(110vw);}}

/* Stars (Jiji night) */
.bg-star{position:absolute;background:white;border-radius:50%;pointer-events:none;animation:star-twinkle var(--d,3s) var(--dl,0s) ease-in-out infinite;}
@keyframes star-twinkle{0%,100%{opacity:.9;transform:scale(1);}50%{opacity:.15;transform:scale(.6);}}
#bg-moon{position:absolute;width:56px;height:56px;border-radius:50%;background:#FFF8E0;box-shadow:0 0 30px rgba(255,248,200,.9),0 0 70px rgba(255,248,200,.3);top:8%;right:12%;pointer-events:none;}

/* ─── CHARACTER (position:fixed, walks full viewport) ─────────────── */
#char-pos{position:fixed;bottom:54px;left:0;cursor:pointer;z-index:10;}
#char-inner{display:flex;flex-direction:column;align-items:center;transform-origin:bottom center;}
#char-flip{transform-origin:center bottom;display:flex;flex-direction:column;align-items:center;}
#char-flip.facing-left{transform:scaleX(-1);}
#char-wrap{position:relative;display:inline-block;}
#char-img{display:block;mix-blend-mode:multiply;}

/* Eye blink — brief scaleY squish centred on eye area */
#char-img.blinking{animation:eye-blink .10s ease-in-out;transform-origin:50% 36%;}
@keyframes eye-blink{0%,100%{transform:scaleY(1);}45%,55%{transform:scaleY(0.70);}}

/* ── Animated CSS legs ─────────────────────────────────────────── */
#char-legs{display:flex;align-items:flex-end;justify-content:center;position:relative;z-index:-1;margin-top:-8px;}
.leg{transform-origin:top center;}

/* Totoro: stubby grey rounded legs */
body[data-char="totoro"] #char-legs{gap:22px;}
body[data-char="totoro"] .leg{width:13px;height:22px;background:#7A8878;border-radius:7px;}

/* Duck: slim orange legs with flat web foot */
body[data-char="chibi"] #char-legs{gap:18px;}
body[data-char="chibi"] .leg{width:6px;height:18px;background:#E07800;border-radius:3px 3px 0 0;position:relative;}
body[data-char="chibi"] .leg::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:16px;height:5px;background:#E07800;border-radius:3px;}

/* Jiji: slim black legs with paw bump */
body[data-char="jiji"] #char-legs{gap:16px;}
body[data-char="jiji"] .leg{width:6px;height:20px;background:#1A1A1A;border-radius:3px 3px 5px 5px;position:relative;}
body[data-char="jiji"] .leg::after{content:'';position:absolute;bottom:-3px;left:50%;transform:translateX(-50%);width:12px;height:6px;background:#1A1A1A;border-radius:50%;}

/* Step animations — timing driven by --ws variable */
.walking .leg-l{animation:leg-step-l var(--ws,.46s) ease-in-out infinite;}
.walking .leg-r{animation:leg-step-r var(--ws,.46s) ease-in-out infinite;}
@keyframes leg-step-l{0%,100%{transform:rotate(-22deg);}50%{transform:rotate(22deg);}}
@keyframes leg-step-r{0%,100%{transform:rotate(22deg);}50%{transform:rotate(-22deg);}}

/* Character ground shadow */
#char-shadow{position:fixed;z-index:2;pointer-events:none;background:rgba(0,0,0,.18);border-radius:50%;height:10px;}

/* ── Walk & action animations ──────────────────────────────────── */
@keyframes waddle    {0%,100%{transform:rotate(-2.5deg) translateY(0);}25%{transform:rotate(0) translateY(-8px);}50%{transform:rotate(2.5deg) translateY(0);}75%{transform:rotate(0) translateY(-6px);}}
@keyframes chibi-hop {0%,100%{transform:translateY(0) rotate(0);}20%{transform:translateY(-13px) rotate(-5deg);}50%{transform:translateY(0);}70%{transform:translateY(-10px) rotate(5deg);}}
@keyframes jiji-trot {0%,100%{transform:translateY(0) scaleX(1);}25%{transform:translateY(-6px) scaleX(.97);}75%{transform:translateY(-5px) scaleX(1.02);}}
body[data-char="totoro"] .walking #char-inner{animation:waddle    .46s ease-in-out infinite;}
body[data-char="chibi"]  .walking #char-inner{animation:chibi-hop .52s ease-in-out infinite;}
body[data-char="jiji"]   .walking #char-inner{animation:jiji-trot .40s ease-in-out infinite;}

@keyframes sit-breathe  {0%,100%{transform:scaleY(1);}50%{transform:scaleY(.97);}}
@keyframes sleep-tilt   {to{transform:rotate(22deg) translateY(10px);}}
@keyframes sleep-breathe{0%,100%{transform:rotate(22deg) translateY(10px) scaleX(.99);}50%{transform:rotate(22deg) translateY(10px) scaleX(1.01);}}
@keyframes flat-breathe {0%,100%{transform:scaleY(1);}50%{transform:scaleY(.93);}}
@keyframes eat-nod      {0%,100%{transform:rotate(0);}33%{transform:rotate(9deg);}66%{transform:rotate(-5deg);}}
@keyframes pet-sway     {0%,100%{transform:rotate(0);}50%{transform:rotate(-14deg);}}
@keyframes roar-shake   {0%,100%{transform:translateX(0);}25%{transform:translateX(-7px);}75%{transform:translateX(7px);}}
@keyframes task-bounce  {0%{transform:scale(1);}30%{transform:scale(1.16) translateY(-11px);}65%{transform:scale(.97) translateY(2px);}100%{transform:scale(1);}}

.sitting    #char-inner{animation:sit-breathe   3.2s ease-in-out infinite;}
.sleeping   #char-inner{animation:sleep-tilt    1.2s ease-in-out forwards;}
.sleep-deep #char-inner{animation:sleep-breathe 2.8s ease-in-out infinite;}
.sleep-flat #char-inner{animation:flat-breathe  3.0s ease-in-out infinite;}
.eating     #char-inner{animation:eat-nod       .6s  ease-in-out 3;}
.petting    #char-inner{animation:pet-sway      1.4s ease-in-out 2;}
.playing    #char-inner{animation:roar-shake    .5s  ease-in-out 3;}
.taskdone   #char-inner{animation:task-bounce   .5s  ease-out    2;}

/* ─── SPEECH BUBBLE ─────────────────────────────────────────────── */
#speech-bubble{position:fixed;z-index:20;background:white;border-radius:14px;padding:6px 13px;font-size:12px;font-family:'Nunito',sans-serif;font-weight:700;color:#2A3428;white-space:nowrap;pointer-events:none;box-shadow:0 3px 14px rgba(0,0,0,.18);opacity:0;transform:translateY(-5px) scale(.9);transition:opacity .25s,transform .25s;}
#speech-bubble.visible{opacity:1;transform:translateY(0) scale(1);}
#speech-bubble::after{content:'';position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-top:8px solid white;}

/* ─── FLOAT / ZZZ ───────────────────────────────────────────────── */
.float-el{position:fixed;pointer-events:none;animation:float-up 1.4s ease-out forwards;font-size:24px;z-index:15;}
@keyframes float-up{0%{opacity:1;transform:translateY(0) scale(1);}70%{opacity:.9;transform:translateY(-60px) scale(1.2);}100%{opacity:0;transform:translateY(-90px) scale(.6);}}
.zzz-el{position:fixed;pointer-events:none;font-family:'Space Mono',monospace;color:rgba(255,255,255,.92);text-shadow:0 1px 4px rgba(0,0,0,.3);font-size:13px;font-weight:700;animation:zzz-drift 2.4s ease-out infinite;z-index:15;}
@keyframes zzz-drift{0%{opacity:0;transform:translate(0,0) scale(.5);}25%{opacity:.9;}100%{opacity:0;transform:translate(28px,-42px) scale(1);}}

/* ─── PANEL OPEN BUTTON ─────────────────────────────────────────── */
#panel-btn{position:fixed;top:16px;right:16px;z-index:100;width:50px;height:50px;border-radius:50%;background:var(--acc,#527848);color:white;border:none;cursor:pointer;font-size:22px;box-shadow:0 4px 20px rgba(0,0,0,.3);display:none;align-items:center;justify-content:center;transition:transform .15s,box-shadow .15s;}
#panel-btn:hover{transform:scale(1.1);box-shadow:0 6px 28px rgba(0,0,0,.4);}
#panel-btn.show{display:flex;}

/* ─── FLOATING TODO PANEL ───────────────────────────────────────── */
#todo-panel{position:fixed;top:14px;right:14px;z-index:90;width:min(340px,calc(100vw - 28px));max-height:calc(100vh - 28px);overflow-y:auto;overflow-x:hidden;background:var(--card,rgba(250,253,245,.97));border:1.5px solid var(--brd,#C8DEB8);border-radius:20px;box-shadow:0 8px 40px rgba(0,0,0,.22),0 2px 8px rgba(0,0,0,.1);transform-origin:top right;transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .22s;}
#todo-panel.hidden{transform:scale(.5) translateX(40px) translateY(-40px);opacity:0;pointer-events:none;}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 10px;border-bottom:1px solid var(--brd,#C8DEB8);position:sticky;top:0;background:var(--card);z-index:2;border-radius:20px 20px 0 0;}
.panel-title{font-family:'Comfortaa',cursive;font-size:17px;font-weight:700;color:var(--acc,#527848);}
.panel-actions{display:flex;gap:8px;align-items:center;}
.btn-switch{font-size:11px;font-family:'Nunito',sans-serif;background:transparent;color:var(--acc);border:1.5px solid var(--brd);border-radius:20px;padding:4px 10px;cursor:pointer;transition:background .15s;}
.btn-switch:hover{background:var(--brd);}
.btn-close{background:none;border:none;font-size:18px;color:var(--sub,#6A7860);cursor:pointer;line-height:1;padding:2px 5px;transition:color .1s;}
.btn-close:hover{color:var(--txt,#2A3428);}
.reward-strip{display:flex;gap:8px;padding:10px 12px 8px;border-bottom:1px solid var(--brd);}
.reward-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:7px 4px;border-radius:12px;border:1.5px solid var(--brd);background:var(--srf);cursor:pointer;font-size:13px;font-weight:600;color:var(--txt);transition:background .15s,transform .1s;}
.reward-btn .rc{font-family:'Space Mono',monospace;font-size:10px;color:var(--sub);}
.reward-btn:hover:not(:disabled){background:var(--brd);transform:scale(1.04);}
.reward-btn:disabled{opacity:.35;cursor:default;}
.meters{display:flex;gap:10px;padding:10px 12px;border-bottom:1px solid var(--brd);}
.meter{flex:1;}
.meter-lbl{font-size:11px;font-weight:600;color:var(--sub);display:flex;justify-content:space-between;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px;}
.meter-bar{height:7px;background:var(--brd);border-radius:6px;overflow:hidden;}
.meter-fill{height:100%;background:var(--acc2);border-radius:6px;transition:width .4s ease;}
.tally-bar{display:flex;align-items:center;gap:7px;padding:8px 12px;border-bottom:1px solid var(--brd);font-size:12px;color:var(--sub);}
.tally-val{font-family:'Space Mono',monospace;font-weight:700;color:var(--acc);font-size:13px;}
.tasks-wrap{padding:12px;}
.add-row{display:flex;gap:7px;margin-bottom:10px;}
.add-input{flex:1;padding:8px 11px;background:var(--srf);border:1.5px solid var(--brd);border-radius:11px;font-family:'Nunito',sans-serif;font-size:13px;color:var(--txt);outline:none;transition:border-color .15s;}
.add-input:focus{border-color:var(--acc);}
.add-input::placeholder{color:var(--sub);opacity:.65;}
.tag-sel{padding:8px 5px;background:var(--srf);border:1.5px solid var(--brd);border-radius:11px;font-family:'Nunito',sans-serif;font-size:12px;color:var(--txt);cursor:pointer;outline:none;}
.btn-add{padding:8px 13px;background:var(--acc);color:white;border:none;border-radius:11px;font-size:16px;font-weight:700;cursor:pointer;transition:filter .15s,transform .1s;}
.btn-add:hover{filter:brightness(1.15);transform:scale(1.06);}
.task-list{display:flex;flex-direction:column;gap:5px;}
.task-item{display:flex;align-items:center;gap:9px;padding:7px 9px;background:var(--srf);border:1.5px solid var(--brd);border-radius:11px;transition:opacity .2s;}
.task-item.done{opacity:.4;}
.task-cb{width:17px;height:17px;flex-shrink:0;border:2px solid var(--brd);border-radius:50%;cursor:pointer;appearance:none;-webkit-appearance:none;background:white;position:relative;transition:background .15s,border-color .15s;}
.task-cb:checked{background:var(--acc);border-color:var(--acc);}
.task-cb:checked::after{content:'';position:absolute;left:3px;top:1px;width:5px;height:9px;border:2px solid white;border-top:0;border-left:0;transform:rotate(45deg);}
.task-txt{flex:1;font-size:13px;color:var(--txt);line-height:1.3;}
.task-item.done .task-txt{text-decoration:line-through;color:var(--sub);}
.task-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:var(--brd);color:var(--acc);text-transform:uppercase;letter-spacing:.3px;}
.task-del{background:none;border:none;color:var(--sub);font-size:17px;cursor:pointer;line-height:1;opacity:.4;transition:opacity .15s;padding:0 2px;}
.task-del:hover{opacity:1;}
.empty-state{text-align:center;padding:18px 10px;color:var(--sub);font-size:13px;font-style:italic;}

/* ─── HINT ───────────────────────────────────────────────────────── */
#hint{position:fixed;bottom:64px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,.6);pointer-events:none;z-index:3;white-space:nowrap;font-family:'Nunito',sans-serif;text-shadow:0 1px 4px rgba(0,0,0,.3);transition:opacity 1.2s;}
</style>
</head>
<body>

<!-- SELECTION SCREEN -->
<div id="sel-screen">
  <div class="sparkle" style="left:10%;top:18%;--d:3.8s;--dl:0s"></div>
  <div class="sparkle" style="left:26%;top:66%;--d:4.2s;--dl:-1.1s"></div>
  <div class="sparkle" style="left:54%;top:14%;--d:3.5s;--dl:-.6s"></div>
  <div class="sparkle" style="left:71%;top:50%;--d:4.6s;--dl:-2s"></div>
  <div class="sparkle" style="left:84%;top:28%;--d:3.9s;--dl:-.3s"></div>
  <div class="sparkle" style="left:38%;top:82%;--d:4.1s;--dl:-1.7s"></div>
  <div class="sparkle" style="left:90%;top:72%;--d:3.6s;--dl:-.9s"></div>
  <div class="sparkle" style="left:6%;top:54%;--d:4.3s;--dl:-1.4s"></div>
  <div class="sel-title">Choose your<br><em>Ghibli companion</em> ✨</div>
  <div class="sel-sub">They'll roam your screen while you get things done</div>
  <div class="sel-cards">
    <div class="sel-card" onclick="selectChar('totoro')">
      <div class="sel-preview" style="width:120px;height:110px;background-image:url('totoroneutral.png')"></div>
      <div class="sel-card-name">Totoro</div>
      <div class="sel-card-role">Forest Spirit</div>
    </div>
    <div class="sel-card" onclick="selectChar('chibi')">
      <div class="sel-preview" style="width:110px;height:110px;background-image:url('duckneurtral.png')"></div>
      <div class="sel-card-name">Chibi</div>
      <div class="sel-card-role">Explorer Duck</div>
    </div>
    <div class="sel-card" onclick="selectChar('jiji')">
      <div class="sel-preview" style="width:100px;height:110px;background-image:url('jijineutral.png')"></div>
      <div class="sel-card-name">Jiji</div>
      <div class="sel-card-role">Witch's Cat</div>
    </div>
  </div>
</div>

<!-- DESKTOP STAGE -->
<div id="desktop-bg"></div>
<div id="ground"></div>
<div id="char-shadow"></div>

<!-- CHARACTER -->
<div id="char-pos" style="display:none" onclick="onCharClick()">
  <div id="char-inner">
    <div id="char-flip">
      <div id="char-wrap">
        <img id="char-img" src="" alt="" style="display:block;mix-blend-mode:multiply;">
      </div>
      <div id="char-legs">
        <div class="leg leg-l"></div>
        <div class="leg leg-r"></div>
      </div>
    </div>
  </div>
</div>

<div id="speech-bubble"><span id="bubble-txt"></span></div>

<!-- PANEL TOGGLE (visible when panel is closed) -->
<button id="panel-btn" onclick="openPanel()" title="Open to-do list">📋</button>

<!-- FLOATING TODO PANEL -->
<div id="todo-panel">
  <div class="panel-hdr">
    <span class="panel-title" id="app-title">Totoro's To-Do</span>
    <div class="panel-actions">
      <button class="btn-switch" onclick="showSelection()">✨ Switch</button>
      <button class="btn-close" onclick="closePanel()" title="Minimise">−</button>
    </div>
  </div>
  <div class="reward-strip">
    <button class="reward-btn" id="btn-snack" onclick="doSnack()">
      <span id="ri0">🌰</span><span id="rl0">Snack</span><span class="rc" id="snack-ct">×0</span>
    </button>
    <button class="reward-btn" onclick="doPet()"><span id="ri1">✋</span><span id="rl1">Pat</span></button>
    <button class="reward-btn" onclick="doPlay()"><span id="ri2">🌪️</span><span id="rl2">Roar</span></button>
  </div>
  <div class="meters">
    <div class="meter">
      <div class="meter-lbl"><span>🐾 Walk</span><span id="walk-pct">0%</span></div>
      <div class="meter-bar"><div class="meter-fill" id="walk-fill" style="width:0%"></div></div>
    </div>
    <div class="meter">
      <div class="meter-lbl"><span>🍃 Feed</span><span id="feed-pct">0%</span></div>
      <div class="meter-bar"><div class="meter-fill" id="feed-fill" style="width:0%"></div></div>
    </div>
  </div>
  <div class="tally-bar">
    <span id="tally-icon">🌰</span>
    <span id="tally-lbl">Rewards earned:</span>
    <span class="tally-val" id="tally-total">0</span>
  </div>
  <div class="tasks-wrap">
    <div class="add-row">
      <input id="task-inp" class="add-input" type="text" placeholder="Add a task…" maxlength="80"
        onkeydown="if(event.key==='Enter')addTask()"/>
      <select id="tag-sel" class="tag-sel">
        <option value="none">—</option>
        <option value="walk">🐾</option>
        <option value="feed">🍃</option>
      </select>
      <button class="btn-add" onclick="addTask()">+</button>
    </div>
    <div id="task-list" class="task-list"></div>
  </div>
</div>

<div id="hint">click your companion ✦</div>

<script>
(function(){
'use strict';

var CHARS = {
  totoro:{title:"Totoro's To-Do",ri:'🌰',rl:'Snack',pi:'✋',pl:'Pat',yi:'🌪️',yl:'Roar',tl:'Acorns:',speed:.55,ws:'.46s',
    img:{neutral:'totoroneutral.png',waiting:'totorostare.png',greeting:'totorohai.png',taskdone:'totoroexcited.png',celebrate:'totorojump.png',idle:'totoroneutral.png',sleeping:'totoroneutral.png'},
    bubbles:["Any updates? 👀","Pssst… tasks? 🌿","Still waiting 🍃","I'm watching 👀","How's the list? 🌱"]},
  chibi:{title:"Chibi's To-Do",ri:'🌸',rl:'Treat',pi:'🎀',pl:'Hug',yi:'🎈',yl:'Hop',tl:'Treats:',speed:.70,ws:'.52s',
    img:{neutral:'duckneurtral.png',waiting:'duckcry.png',greeting:'duckhi.png',taskdone:'duckhappy.png',celebrate:'duckhappy.png',idle:'duckgoingtosleep.png',sleeping:'ducksleep.png'},
    bubbles:["please… 🥺","any progress? 💧","still nothing 🐣","hello?? 🌸","don't forget me 💕"]},
  jiji:{title:"Jiji's To-Do",ri:'🐟',rl:'Fish',pi:'🎀',pl:'Pet',yi:'✨',yl:'Magic',tl:'Fish:',speed:.62,ws:'.40s',
    img:{neutral:'jijineutral.png',waiting:'jijiannoyed.png',greeting:'jijiwaiting.png',taskdone:'jijihappy.png',celebrate:'jijihappy.png',idle:'jijisleepy.png',sleeping:'jijisleepy.png'},
    bubbles:["...well?","still nothing. 😒","I'm waiting.","*stares* ✨","tasks exist. do them."]}
};

var DIMS = {
  'totoroneutral.png':{w:184,h:155},'totorohai.png':{w:136,h:155},'totorostare.png':{w:137,h:155},
  'totoroexcited.png':{w:220,h:138},'totorojump.png':{w:180,h:155},
  'duckneurtral.png':{w:134,h:150},'duckhappy.png':{w:145,h:150},'duckhi.png':{w:139,h:150},
  'duckcry.png':{w:149,h:150},'duckgoingtosleep.png':{w:185,h:132},'ducksleep.png':{w:171,h:120},
  'jijineutral.png':{w:126,h:155},'jijihappy.png':{w:188,h:145},'jijiannoyed.png':{w:169,h:148},
  'jijisleepy.png':{w:183,h:130},'jijiwaiting.png':{w:142,h:148}
};

var SLEEP_CLASS = {totoro:'sleeping',chibi:'sleep-flat',jiji:'sleep-flat'};
var GROUND_H = 54;

var sel=null,tasks=[],rewards=0,walkPct=0,feedPct=0;
var cstate='walking',appMode='neutral';
var charX=200,dir=1,charW=150,charH=150;
var rafId=null,idleT=null,deepT=null,bubbleT=null,bubbleHideT=null,blinkT=null;
var inAction=false;

function preload(){Object.keys(DIMS).forEach(function(f){var i=new Image();i.src=f;});}

/* ── background ─────────────────────────────────────────────── */
function genBg(char){
  var bg=document.getElementById('desktop-bg');
  bg.innerHTML='';
  if(char==='jiji'){
    for(var i=0;i<28;i++){
      var s=document.createElement('div');s.className='bg-star';
      s.style.left=(Math.random()*96)+'%';s.style.top=(Math.random()*68)+'%';
      var sz=1+Math.random()*2.5;s.style.width=sz+'px';s.style.height=sz+'px';
      s.style.setProperty('--d',(2+Math.random()*3)+'s');
      s.style.setProperty('--dl',(-Math.random()*3)+'s');
      bg.appendChild(s);
    }
    var moon=document.createElement('div');moon.id='bg-moon';bg.appendChild(moon);
  } else {
    for(var i=0;i<5;i++){
      var c=document.createElement('div');c.className='bg-cloud';
      c.style.top=(5+Math.random()*34)+'%';
      var dur=32+Math.random()*26;
      c.style.setProperty('--d',dur+'s');
      c.style.setProperty('--dl',(-dur*Math.random())+'s');
      c.style.transform='scale('+(0.55+Math.random()*.9)+')';
      c.style.transformOrigin='left center';
      bg.appendChild(c);
    }
  }
}

/* ── init / selection ───────────────────────────────────────── */
function init(){
  sel=localStorage.getItem('ghibli-char');
  if(sel&&CHARS[sel])startApp(sel);
  preload();
}

window.selectChar=function(k){
  sel=k;localStorage.setItem('ghibli-char',k);
  var s=document.getElementById('sel-screen');
  s.classList.add('hide');
  setTimeout(function(){s.style.display='none';},480);
  startApp(k);
};

window.showSelection=function(){
  stopAll();
  document.getElementById('char-pos').style.display='none';
  document.getElementById('hint').style.opacity='0';
  var s=document.getElementById('sel-screen');
  s.style.display='flex';s.classList.remove('hide');
};

function startApp(k){
  var c=CHARS[k];
  document.body.setAttribute('data-char',k);
  document.getElementById('app-title').textContent=c.title;
  document.getElementById('ri0').textContent=c.ri;document.getElementById('rl0').textContent=c.rl;
  document.getElementById('ri1').textContent=c.pi;document.getElementById('rl1').textContent=c.pl;
  document.getElementById('ri2').textContent=c.yi;document.getElementById('rl2').textContent=c.yl;
  document.getElementById('tally-icon').textContent=c.ri;
  document.getElementById('tally-lbl').textContent=c.tl;
  document.body.style.setProperty('--ws',c.ws);

  tasks=JSON.parse(localStorage.getItem('g-tasks-'+k)||'[]');
  rewards=parseInt(localStorage.getItem('g-rew-'+k)||'0');
  walkPct=0;feedPct=0;
  charX=Math.floor(window.innerWidth*0.28);
  dir=1;document.getElementById('char-flip').classList.remove('facing-left');

  genBg(k);
  renderTasks();recalcMeters();updateUI();

  document.getElementById('char-pos').style.display='';
  var hint=document.getElementById('hint');
  hint.style.opacity='1';
  setTimeout(function(){hint.style.opacity='0';},4500);

  var hr=new Date().getHours();
  var todayKey='g-greeted-'+k+'-'+new Date().toDateString();
  if(!localStorage.getItem(todayKey)&&hr>=6&&hr<11){
    localStorage.setItem(todayKey,'1');
    showGreeting();
  } else {
    startContextWalk();
  }
  startBlink();
}

/* ── context state ──────────────────────────────────────────── */
function getContextMode(){
  return tasks.filter(function(t){return !t.done;}).length>0?'waiting':'neutral';
}
function startContextWalk(){
  appMode=getContextMode();setImg(appMode);startWalk();
  if(appMode==='waiting')scheduleBubble();
}
function showGreeting(){
  appMode='greeting';setImg('greeting');
  cstate='sitting';applyState();stopWalk();
  setTimeout(startContextWalk,3800);
}

/* ── image ──────────────────────────────────────────────────── */
function setImg(mode){
  var fn=CHARS[sel].img[mode]||CHARS[sel].img.neutral;
  var d=DIMS[fn]||{w:150,h:150};
  var img=document.getElementById('char-img');
  img.src=fn;img.style.width=d.w+'px';img.style.height=d.h+'px';
  document.getElementById('char-pos').style.width=d.w+'px';
  charW=d.w;charH=d.h;
  updateShadow();
}

/* ── walk engine ────────────────────────────────────────────── */
function maxX(){return Math.max(10,window.innerWidth-charW-10);}
function applyDir(){var f=document.getElementById('char-flip');dir<0?f.classList.add('facing-left'):f.classList.remove('facing-left');}
function applyState(){document.getElementById('char-pos').className=cstate;}
function updateShadow(){
  var sh=document.getElementById('char-shadow');if(!sh)return;
  sh.style.width=Math.round(charW*.52)+'px';
  sh.style.left=(charX+charW*.24)+'px';
  sh.style.bottom=(GROUND_H-6)+'px';
}
function step(){
  charX+=dir*(CHARS[sel]?CHARS[sel].speed:.6);
  var mx=maxX();
  if(charX>=mx){charX=mx;dir=-1;applyDir();}
  if(charX<=0) {charX=0; dir=1; applyDir();}
  document.getElementById('char-pos').style.left=charX+'px';
  updateBubblePos();updateShadow();
  rafId=requestAnimationFrame(step);
}
function startWalk(){stopWalk();cstate='walking';applyState();rafId=requestAnimationFrame(step);resetIdle();}
function stopWalk(){if(rafId){cancelAnimationFrame(rafId);rafId=null;}}
function stopAll(){stopWalk();clearIdle();clearBubble();clearTimeout(blinkT);}
function resetIdle(){clearIdle();idleT=setTimeout(goIdle,40000);deepT=setTimeout(goDeepSleep,65000);}
function clearIdle(){clearTimeout(idleT);clearTimeout(deepT);idleT=deepT=null;removeZzz();}
function removeZzz(){var z=document.querySelector('.zzz-el');if(z)z.remove();}

function goIdle(){
  if(inAction)return;
  stopWalk();clearBubble();
  appMode='idle';setImg('idle');cstate='sitting';applyState();
  deepT=setTimeout(goDeepSleep,25000);
}
function goDeepSleep(){
  if(inAction)return;
  removeZzz();
  document.getElementById('char-flip').classList.remove('facing-left');
  appMode='sleeping';setImg('sleeping');
  cstate=SLEEP_CLASS[sel]||'sleeping';applyState();
  spawnZzz();
  if(cstate==='sleeping'){setTimeout(function(){cstate='sleep-deep';applyState();},1800);}
}
function wake(){
  clearIdle();clearBubble();startContextWalk();
}

window.onCharClick=function(){
  if(appMode==='sleeping'||appMode==='idle'){wake();return;}
  if(inAction)return;
  inAction=true;clearBubble();
  cstate='petting';setImg('taskdone');applyState();
  spawnFloat('💕');
  setTimeout(function(){inAction=false;startContextWalk();},1800);
};

/* ── blink ──────────────────────────────────────────────────── */
function startBlink(){clearTimeout(blinkT);scheduleBlink();}
function scheduleBlink(){blinkT=setTimeout(function(){doBlink();scheduleBlink();},2800+Math.random()*5200);}
function doBlink(){
  if(appMode==='sleeping')return;
  var img=document.getElementById('char-img');
  img.classList.add('blinking');
  setTimeout(function(){
    img.classList.remove('blinking');
    if(Math.random()<.3){
      setTimeout(function(){img.classList.add('blinking');setTimeout(function(){img.classList.remove('blinking');},95);},230);
    }
  },100);
}

/* ── speech bubble ──────────────────────────────────────────── */
function scheduleBubble(){clearBubble();bubbleT=setTimeout(showBubble,16000+Math.random()*14000);}
function showBubble(){
  if(appMode!=='waiting'||cstate!=='walking')return;
  var msgs=CHARS[sel].bubbles;
  document.getElementById('bubble-txt').textContent=msgs[Math.floor(Math.random()*msgs.length)];
  updateBubblePos();
  document.getElementById('speech-bubble').classList.add('visible');
  bubbleHideT=setTimeout(function(){
    document.getElementById('speech-bubble').classList.remove('visible');
    if(appMode==='waiting')scheduleBubble();
  },3200);
}
function clearBubble(){
  clearTimeout(bubbleT);clearTimeout(bubbleHideT);bubbleT=bubbleHideT=null;
  document.getElementById('speech-bubble').classList.remove('visible');
}
function updateBubblePos(){
  var bub=document.getElementById('speech-bubble');
  if(!bub.classList.contains('visible'))return;
  var bw=bub.offsetWidth||90;
  var left=charX+charW/2-bw/2;
  left=Math.max(8,Math.min(left,window.innerWidth-bw-8));
  bub.style.left=left+'px';
  bub.style.bottom=(GROUND_H+charH+22)+'px';
}

/* ── reward actions ─────────────────────────────────────────── */
window.doSnack=function(){
  if(rewards<=0||inAction)return;
  rewards--;save();updateUI();
  inAction=true;clearBubble();wake();
  cstate='eating';setImg('taskdone');applyState();
  spawnFloat(CHARS[sel].ri);
  setTimeout(function(){inAction=false;startContextWalk();},2200);
};
window.doPet=function(){
  if(inAction)return;
  inAction=true;clearBubble();wake();
  cstate='petting';setImg('taskdone');applyState();
  spawnFloat('💕');
  setTimeout(function(){inAction=false;startContextWalk();},2800);
};
window.doPlay=function(){
  if(inAction)return;
  inAction=true;clearBubble();wake();
  cstate='playing';setImg('celebrate');applyState();
  spawnFloat(CHARS[sel].yi);
  setTimeout(function(){inAction=false;startContextWalk();},2400);
};

/* ── spawners ───────────────────────────────────────────────── */
function spawnFloat(e){
  var el=document.createElement('div');el.className='float-el';el.textContent=e;
  el.style.left=(charX+Math.random()*charW*.6+charW*.2)+'px';
  el.style.bottom=(GROUND_H+charH*.35+Math.random()*24)+'px';
  document.body.appendChild(el);
  setTimeout(function(){el.remove();},1500);
}
function spawnZzz(){
  removeZzz();
  var z=document.createElement('div');z.className='zzz-el';z.textContent='z z z';
  z.style.left=(charX+charW*.58)+'px';
  z.style.bottom=(GROUND_H+charH*.72)+'px';
  document.body.appendChild(z);
}

/* ── panel ──────────────────────────────────────────────────── */
window.openPanel =function(){document.getElementById('todo-panel').classList.remove('hidden');document.getElementById('panel-btn').classList.remove('show');};
window.closePanel=function(){document.getElementById('todo-panel').classList.add('hidden');document.getElementById('panel-btn').classList.add('show');};

/* ── tasks ──────────────────────────────────────────────────── */
window.addTask=function(){
  var inp=document.getElementById('task-inp'),ts=document.getElementById('tag-sel');
  var txt=inp.value.trim();if(!txt)return;
  wake();
  tasks.push({id:Date.now(),text:txt,tag:ts.value,done:false});
  inp.value='';ts.value='none';
  save();renderTasks();recalcMeters();
  if(appMode==='neutral'&&!inAction){appMode='waiting';setImg('waiting');scheduleBubble();}
};
window.toggleTask=function(id){
  var t=tasks.find(function(x){return x.id===id;});if(!t)return;
  t.done=!t.done;
  if(t.done){
    if(t.tag==='walk')walkPct=Math.min(100,walkPct+20);
    if(t.tag==='feed')feedPct=Math.min(100,feedPct+20);
    rewards++;
    var tk='g-rtot-'+sel;localStorage.setItem(tk,parseInt(localStorage.getItem(tk)||'0')+1);
    onTaskDone();
  }else{
    if(t.tag==='walk')walkPct=Math.max(0,walkPct-20);
    if(t.tag==='feed')feedPct=Math.max(0,feedPct-20);
    rewards=Math.max(0,rewards-1);
    if(!inAction){appMode=getContextMode();setImg(appMode);}
  }
  save();renderTasks();updateMeters();updateUI();
};
function onTaskDone(){
  inAction=true;clearBubble();stopWalk();
  var allDone=tasks.length>0&&tasks.filter(function(t){return !t.done;}).length===0;
  cstate='taskdone';setImg(allDone?'celebrate':'taskdone');applyState();
  spawnFloat(CHARS[sel].ri);spawnFloat('⭐');
  setTimeout(function(){
    inAction=false;
    if(allDone)appMode='neutral';
    startContextWalk();
  },allDone?3000:2400);
}
window.deleteTask=function(id){
  tasks=tasks.filter(function(t){return t.id!==id;});
  save();renderTasks();recalcMeters();
  if(!inAction){appMode=getContextMode();setImg(appMode);if(appMode==='neutral')clearBubble();}
};
function save(){
  localStorage.setItem('g-tasks-'+sel,JSON.stringify(tasks));
  localStorage.setItem('g-rew-'+sel,rewards);
}
function recalcMeters(){
  var wd=tasks.filter(function(t){return t.tag==='walk'&&t.done;}).length;
  var wt=tasks.filter(function(t){return t.tag==='walk';}).length;
  var fd=tasks.filter(function(t){return t.tag==='feed'&&t.done;}).length;
  var ft=tasks.filter(function(t){return t.tag==='feed';}).length;
  walkPct=wt>0?Math.round(wd/wt*100):0;
  feedPct=ft>0?Math.round(fd/ft*100):0;
  updateMeters();
}
function updateMeters(){
  var wf=document.getElementById('walk-fill'),ff=document.getElementById('feed-fill');
  if(wf)wf.style.width=walkPct+'%';if(ff)ff.style.width=feedPct+'%';
  var wp=document.getElementById('walk-pct'),fp=document.getElementById('feed-pct');
  if(wp)wp.textContent=walkPct+'%';if(fp)fp.textContent=feedPct+'%';
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function renderTasks(){
  var l=document.getElementById('task-list');if(!l)return;
  if(!tasks.length){l.innerHTML='<div class="empty-state">No tasks yet — add one above!</div>';return;}
  l.innerHTML=tasks.map(function(t){
    var tag=t.tag!=='none'?'<span class="task-tag">'+(t.tag==='walk'?'🐾 Walk':'🍃 Feed')+'</span>':'';
    return '<div class="task-item'+(t.done?' done':'')+'">'+
      '<input type="checkbox" class="task-cb"'+(t.done?' checked':'')+' onchange="toggleTask('+t.id+')">'+
      '<span class="task-txt">'+esc(t.text)+'</span>'+tag+
      '<button class="task-del" onclick="deleteTask('+t.id+')">×</button></div>';
  }).join('');
}
function updateUI(){
  var c=document.getElementById('snack-ct');if(c)c.textContent='×'+rewards;
  var b=document.getElementById('btn-snack');if(b)b.disabled=(rewards===0);
  var tot=parseInt(localStorage.getItem('g-rtot-'+sel)||'0');
  var tv=document.getElementById('tally-total');if(tv)tv.textContent=tot;
}

window.addEventListener('resize',function(){charX=Math.min(charX,maxX());});

init();
})();
</script>
</body>
</html>
