<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghibli To-Do</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Nunito:wght@400;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gnd:#E4EED4;--srf:#F4F9EC;--acc:#527848;--acc2:#8AB070;
  --txt:#2A3428;--sub:#6A7860;--card:#FAFDF5;--brd:#C8DEB8;
  --rnd:18px;--sh:0 4px 24px rgba(40,70,30,.10);
}
[data-char="chibi"]{--acc:#B88820;--acc2:#D4AA40;--gnd:#F0EAD0;--srf:#FDF6EC;--txt:#3A2818;--sub:#7A5828;--brd:#E8D8A0;--card:#FFFAF0;}
[data-char="jiji"] {--acc:#7060A0;--acc2:#A090C8;--gnd:#E4E0F4;--srf:#F4F2FC;--txt:#1A1828;--sub:#6050A0;--brd:#C8C0E4;--card:#F8F6FF;}
body{font-family:'Nunito',sans-serif;background:var(--gnd);display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:24px 16px;}

/* ══ SELECTION SCREEN ══════════════════════════════════════════════ */
#sel-screen{
  position:fixed;inset:0;z-index:100;
  background:linear-gradient(168deg,#B8D8F0 0%,#D4EAB8 55%,#C8E4A0 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;gap:22px;
}
#sel-screen.hide{animation:fade-out .5s ease forwards;pointer-events:none;}
@keyframes fade-out{to{opacity:0;transform:scale(.97);}}

.sel-title{font-family:'Comfortaa',cursive;font-size:clamp(20px,5vw,30px);font-weight:700;color:#2A4828;text-align:center;line-height:1.4;}
.sel-title em{color:#527848;font-style:normal;}
.sel-sub{font-size:13px;color:#4A6840;text-align:center;font-style:italic;margin-top:-12px;}
.sel-cards{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;padding:0 12px;}
.sel-card{
  background:rgba(255,255,255,.86);backdrop-filter:blur(8px);
  border:2px solid rgba(255,255,255,.9);border-radius:22px;
  padding:14px 12px 12px;min-width:110px;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  cursor:pointer;box-shadow:0 6px 24px rgba(40,80,30,.12);
  animation:card-float 3s ease-in-out infinite;
  transition:box-shadow .2s,border-color .2s;
}
.sel-card:nth-child(2){animation-delay:-1s;}
.sel-card:nth-child(3){animation-delay:-2s;}
.sel-card:hover{animation-play-state:paused;transform:translateY(-7px) scale(1.05)!important;box-shadow:0 16px 40px rgba(40,80,30,.22);border-color:rgba(80,190,80,.5);}
@keyframes card-float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.sel-preview{background-repeat:no-repeat;background-size:contain;background-position:center bottom;mix-blend-mode:multiply;}
.sel-card-name{font-family:'Comfortaa',cursive;font-size:14px;font-weight:700;color:#2A3428;}
.sel-card-role{font-size:11px;color:#6A8060;text-align:center;line-height:1.4;}

.sparkle{position:absolute;width:7px;height:7px;border-radius:50%;background:radial-gradient(circle,#FFE860,#FFCC00 60%,transparent);animation:sp-drift var(--d,4s) var(--dl,0s) ease-in-out infinite;opacity:0;}
@keyframes sp-drift{0%{opacity:0;transform:translateY(0) scale(.4);}30%{opacity:.85;transform:translateY(-22px) scale(1);}70%{opacity:.5;transform:translateY(-52px) scale(.8);}100%{opacity:0;transform:translateY(-80px) scale(.2);}}

/* ══ APP ════════════════════════════════════════════════════════════ */
.app{width:100%;max-width:380px;display:none;flex-direction:column;gap:14px;}
.app.visible{display:flex;}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:0 4px;}
.hdr-title{font-family:'Comfortaa',cursive;font-size:22px;font-weight:700;color:var(--acc);}
.btn-switch{font-size:12px;font-family:'Nunito',sans-serif;background:var(--card);color:var(--acc);border:1.5px solid var(--brd);border-radius:20px;padding:5px 12px;cursor:pointer;transition:background .15s,transform .1s;}
.btn-switch:hover{background:var(--brd);transform:scale(1.04);}

/* ══ STAGE CARD ═════════════════════════════════════════════════════ */
.stage-card{background:var(--card);border:1.5px solid var(--brd);border-radius:var(--rnd);box-shadow:var(--sh);overflow:hidden;}
.reward-strip{display:flex;gap:8px;padding:10px 12px 8px;border-bottom:1px solid var(--brd);}
.reward-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:7px 4px;border-radius:12px;border:1.5px solid var(--brd);background:var(--srf);cursor:pointer;font-size:13px;font-weight:600;color:var(--txt);transition:background .15s,transform .1s;}
.reward-btn .rc{font-family:'Space Mono',monospace;font-size:11px;color:var(--sub);}
.reward-btn:hover:not(:disabled){background:var(--brd);transform:scale(1.04);}
.reward-btn:disabled{opacity:.38;cursor:default;}

.char-stage{height:210px;position:relative;overflow:hidden;}
[data-char="totoro"] .char-stage{background:linear-gradient(180deg,#B8D8A0 0%,#D8EEC8 55%,#C8E0A8 100%);}
[data-char="chibi"]  .char-stage{background:linear-gradient(180deg,#C8E0F0 0%,#F0E8D0 55%,#E8DDB8 100%);}
[data-char="jiji"]   .char-stage{background:linear-gradient(180deg,#D0CCEC 0%,#E8E4F8 55%,#D4D0EC 100%);}
/* Ground line */
.char-stage::after{content:'';position:absolute;bottom:28px;left:10%;right:10%;height:2px;background:rgba(0,0,0,.08);border-radius:2px;}

#char-pos{position:absolute;bottom:16px;left:0;}
#char-inner{display:flex;align-items:flex-end;justify-content:center;transform-origin:bottom center;}
#char-flip{transform-origin:center bottom;}
#char-flip.facing-left{transform:scaleX(-1);}
#char-img{display:block;mix-blend-mode:multiply;transition:opacity .2s;}

/* ══ SPEECH BUBBLE ══════════════════════════════════════════════════ */
#speech-bubble{
  position:absolute;z-index:20;
  background:white;border-radius:14px;padding:6px 12px;
  font-size:12px;font-family:'Nunito',sans-serif;font-weight:600;color:#2A3428;
  white-space:nowrap;pointer-events:none;
  box-shadow:0 3px 12px rgba(0,0,0,.15);
  opacity:0;transform:translateY(-4px) scale(.9);
  transition:opacity .3s,transform .3s;
}
#speech-bubble.visible{opacity:1;transform:translateY(0) scale(1);}
#speech-bubble::after{
  content:'';position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);
  width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-top:8px solid white;
}

/* ══ WALK ANIMATIONS ════════════════════════════════════════════════ */
@keyframes waddle{0%,100%{transform:rotate(-2deg) translateY(0);}25%{transform:rotate(0) translateY(-6px);}50%{transform:rotate(2deg) translateY(0);}75%{transform:rotate(0) translateY(-4px);}}
@keyframes chibi-hop{0%,100%{transform:translateY(0) rotate(0);}20%{transform:translateY(-10px) rotate(-4deg);}50%{transform:translateY(0) rotate(0);}70%{transform:translateY(-8px) rotate(4deg);}}
@keyframes jiji-trot{0%,100%{transform:translateY(0);}25%{transform:translateY(-5px) scaleX(.97);}75%{transform:translateY(-4px) scaleX(1.02);}}

[data-char="totoro"] .walking #char-inner{animation:waddle .46s ease-in-out infinite;}
[data-char="chibi"]  .walking #char-inner{animation:chibi-hop .52s ease-in-out infinite;}
[data-char="jiji"]   .walking #char-inner{animation:jiji-trot .40s ease-in-out infinite;}

@keyframes sit-breathe  {0%,100%{transform:scaleY(1);}50%{transform:scaleY(.97);}}
@keyframes sleep-tilt   {to{transform:rotate(20deg) translateY(10px);}}
@keyframes sleep-breathe{0%,100%{transform:rotate(20deg) translateY(10px) scaleX(.99);}50%{transform:rotate(20deg) translateY(10px) scaleX(1.01);}}
@keyframes flat-breathe {0%,100%{transform:scaleY(1);}50%{transform:scaleY(.94);}}
@keyframes eat-nod      {0%,100%{transform:rotate(0);}33%{transform:rotate(8deg);}66%{transform:rotate(-5deg);}}
@keyframes pet-sway     {0%,100%{transform:rotate(0);}50%{transform:rotate(-12deg);}}
@keyframes roar-shake   {0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}
@keyframes task-bounce  {0%{transform:scale(1);}30%{transform:scale(1.12) translateY(-8px);}60%{transform:scale(.97) translateY(2px);}100%{transform:scale(1);}}
@keyframes celebrate-spin{0%{transform:rotate(0) scale(1);}25%{transform:rotate(-8deg) scale(1.08);}75%{transform:rotate(8deg) scale(1.08);}100%{transform:rotate(0) scale(1);}}

.sitting    #char-inner{animation:sit-breathe  3.2s ease-in-out infinite;}
.sleeping   #char-inner{animation:sleep-tilt   1.1s ease-in-out forwards;}
.sleep-deep #char-inner{animation:sleep-breathe 2.8s ease-in-out infinite;}
.sleep-flat #char-inner{animation:flat-breathe 3s ease-in-out infinite;}
.eating     #char-inner{animation:eat-nod      .6s ease-in-out 3;}
.petting    #char-inner{animation:pet-sway     1.4s ease-in-out 2;}
.playing    #char-inner{animation:celebrate-spin .5s ease-in-out 3;}
.taskdone   #char-inner{animation:task-bounce  .5s ease-out 2;}

/* ══ FLOATS ═════════════════════════════════════════════════════════ */
.float-el{position:absolute;pointer-events:none;animation:float-up 1.4s ease-out forwards;font-size:22px;z-index:10;}
@keyframes float-up{0%{opacity:1;transform:translateY(0) scale(1);}70%{opacity:.9;transform:translateY(-56px) scale(1.2);}100%{opacity:0;transform:translateY(-86px) scale(.7);}}
.zzz-el{position:absolute;pointer-events:none;font-family:'Space Mono',monospace;color:var(--acc2);font-size:13px;font-weight:700;animation:zzz-drift 2.4s ease-out infinite;}
@keyframes zzz-drift{0%{opacity:0;transform:translate(0,0) scale(.5);}25%{opacity:.9;}100%{opacity:0;transform:translate(24px,-34px) scale(1);}}

/* ══ METERS ═════════════════════════════════════════════════════════ */
.meters{display:flex;gap:10px;padding:10px 12px 12px;border-top:1px solid var(--brd);}
.meter{flex:1;}
.meter-lbl{font-size:11px;font-weight:600;color:var(--sub);display:flex;justify-content:space-between;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;}
.meter-bar{height:8px;background:var(--brd);border-radius:6px;overflow:hidden;}
.meter-fill{height:100%;background:var(--acc2);border-radius:6px;transition:width .4s ease;}

/* ══ TASKS ══════════════════════════════════════════════════════════ */
.tasks-card{background:var(--card);border:1.5px solid var(--brd);border-radius:var(--rnd);box-shadow:var(--sh);padding:14px;}
.add-row{display:flex;gap:8px;margin-bottom:12px;}
.add-input{flex:1;padding:9px 12px;background:var(--srf);border:1.5px solid var(--brd);border-radius:12px;font-family:'Nunito',sans-serif;font-size:14px;color:var(--txt);outline:none;transition:border-color .15s;}
.add-input:focus{border-color:var(--acc);}
.add-input::placeholder{color:var(--sub);opacity:.7;}
.tag-sel{padding:9px 6px;background:var(--srf);border:1.5px solid var(--brd);border-radius:12px;font-family:'Nunito',sans-serif;font-size:13px;color:var(--txt);cursor:pointer;outline:none;}
.btn-add{padding:9px 14px;background:var(--acc);color:white;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:filter .15s,transform .1s;}
.btn-add:hover{filter:brightness(1.15);transform:scale(1.06);}
.task-list{display:flex;flex-direction:column;gap:6px;}
.task-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--srf);border:1.5px solid var(--brd);border-radius:12px;transition:opacity .2s;}
.task-item.done{opacity:.45;}
.task-cb{width:18px;height:18px;flex-shrink:0;border:2px solid var(--brd);border-radius:50%;cursor:pointer;appearance:none;-webkit-appearance:none;background:white;position:relative;transition:background .15s,border-color .15s;}
.task-cb:checked{background:var(--acc);border-color:var(--acc);}
.task-cb:checked::after{content:'';position:absolute;left:3px;top:1px;width:6px;height:10px;border:2px solid white;border-top:0;border-left:0;transform:rotate(45deg);}
.task-txt{flex:1;font-size:14px;color:var(--txt);line-height:1.3;}
.task-item.done .task-txt{text-decoration:line-through;color:var(--sub);}
.task-tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--brd);color:var(--acc);text-transform:uppercase;letter-spacing:.3px;}
.task-del{background:none;border:none;color:var(--sub);font-size:18px;cursor:pointer;line-height:1;opacity:.45;transition:opacity .15s;padding:0 2px;}
.task-del:hover{opacity:1;}
.empty-state{text-align:center;padding:20px 10px;color:var(--sub);font-size:14px;font-style:italic;}
.tally-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;border-top:1px solid var(--brd);font-size:13px;color:var(--sub);}
.tally-val{font-family:'Space Mono',monospace;font-weight:700;color:var(--acc);}
</style>
</head>
<body>

<!-- ════════════ SELECTION SCREEN ════════════ -->
<div id="sel-screen">
  <div class="sparkle" style="left:10%;top:18%;--d:3.8s;--dl:0s"></div>
  <div class="sparkle" style="left:26%;top:66%;--d:4.2s;--dl:-1.1s"></div>
  <div class="sparkle" style="left:54%;top:14%;--d:3.5s;--dl:-.6s"></div>
  <div class="sparkle" style="left:71%;top:50%;--d:4.6s;--dl:-2s"></div>
  <div class="sparkle" style="left:84%;top:28%;--d:3.9s;--dl:-.3s"></div>
  <div class="sparkle" style="left:38%;top:82%;--d:4.1s;--dl:-1.7s"></div>
  <div class="sparkle" style="left:90%;top:72%;--d:3.6s;--dl:-.9s"></div>
  <div class="sparkle" style="left:6%;top:54%;--d:4.3s;--dl:-1.4s"></div>

  <div class="sel-title">Choose your<br><em>Ghibli companion</em> ✨</div>
  <div class="sel-sub">They'll keep you company while you get things done</div>

  <div class="sel-cards">
    <div class="sel-card" onclick="selectChar('totoro')">
      <div class="sel-preview" style="width:120px;height:115px;background-image:url('totoroneutral.png')"></div>
      <div class="sel-card-name">Totoro</div>
      <div class="sel-card-role">Forest Spirit</div>
    </div>
    <div class="sel-card" onclick="selectChar('chibi')">
      <div class="sel-preview" style="width:110px;height:115px;background-image:url('duckneurtral.png')"></div>
      <div class="sel-card-name">Chibi</div>
      <div class="sel-card-role">Explorer Duck</div>
    </div>
    <div class="sel-card" onclick="selectChar('jiji')">
      <div class="sel-preview" style="width:105px;height:115px;background-image:url('jijineutral.png')"></div>
      <div class="sel-card-name">Jiji</div>
      <div class="sel-card-role">Witch's Cat</div>
    </div>
  </div>
</div>

<!-- ════════════ MAIN APP ════════════ -->
<div id="app" class="app" data-char="totoro">

  <div class="hdr">
    <div class="hdr-title" id="app-title">Totoro's To-Do</div>
    <button class="btn-switch" onclick="showSelection()">✨ Switch</button>
  </div>

  <div class="stage-card">
    <div class="reward-strip">
      <button class="reward-btn" id="btn-snack" onclick="doSnack()">
        <span id="ri0">🌰</span><span id="rl0">Snack</span><span class="rc" id="snack-ct">×0</span>
      </button>
      <button class="reward-btn" onclick="doPet()">
        <span id="ri1">✋</span><span id="rl1">Pat</span>
      </button>
      <button class="reward-btn" onclick="doPlay()">
        <span id="ri2">🌪️</span><span id="rl2">Roar</span>
      </button>
    </div>

    <div class="char-stage" id="char-stage">
      <div id="speech-bubble"><span id="bubble-txt"></span></div>
      <div id="char-pos">
        <div id="char-inner">
          <div id="char-flip">
            <img id="char-img" src="" alt="" style="display:block;mix-blend-mode:multiply;">
          </div>
        </div>
      </div>
    </div>

    <div class="meters">
      <div class="meter">
        <div class="meter-lbl"><span>🐾 Walk</span><span id="walk-pct">0%</span></div>
        <div class="meter-bar"><div class="meter-fill" id="walk-fill" style="width:0%"></div></div>
      </div>
      <div class="meter">
        <div class="meter-lbl"><span>🍃 Feed</span><span id="feed-pct">0%</span></div>
        <div class="meter-bar"><div class="meter-fill" id="feed-fill" style="width:0%"></div></div>
      </div>
    </div>

    <div class="tally-bar">
      <span id="tally-icon">🌰</span>
      <span id="tally-lbl">Rewards earned:</span>
      <span class="tally-val" id="tally-total">0</span>
    </div>
  </div>

  <div class="tasks-card">
    <div class="add-row">
      <input id="task-inp" class="add-input" type="text" placeholder="Add a task…" maxlength="80"
        onkeydown="if(event.key==='Enter')addTask()"/>
      <select id="tag-sel" class="tag-sel">
        <option value="none">—</option>
        <option value="walk">🐾 Walk</option>
        <option value="feed">🍃 Feed</option>
      </select>
      <button class="btn-add" onclick="addTask()">+</button>
    </div>
    <div id="task-list" class="task-list"></div>
  </div>

</div>

<script>
(function(){
'use strict';

/* ── character config ────────────────────────────────────────────── */
var CHARS = {
  totoro:{
    title:"Totoro's To-Do",ri:'🌰',rl:'Snack',pi:'✋',pl:'Pat',yi:'🌪️',yl:'Roar',tl:'Acorns:',speed:.6,
    img:{
      neutral:   'totoroneutral.png',
      waiting:   'totorostare.png',
      greeting:  'totorohai.png',
      taskdone:  'totoroexcited.png',
      celebrate: 'totorojump.png',
      idle:      'totoroneutral.png',
      sleeping:  'totoroneutral.png'
    },
    bubbles:["Any updates? 👀","Pssst… tasks? 🌿","Still waiting 🍃","I'm watching 👀","How's the list? 🌱"]
  },
  chibi:{
    title:"Chibi's To-Do",ri:'🌸',rl:'Treat',pi:'🎀',pl:'Hug',yi:'🎈',yl:'Hop',tl:'Treats:',speed:.78,
    img:{
      neutral:   'duckneurtral.png',
      waiting:   'duckcry.png',
      greeting:  'duckhi.png',
      taskdone:  'duckhappy.png',
      celebrate: 'duckhappy.png',
      idle:      'duckgoingtosleep.png',
      sleeping:  'ducksleep.png'
    },
    bubbles:["please… 🥺","any progress? 💧","still nothing 🐣","hello?? 🌸","don't forget me 💕"]
  },
  jiji:{
    title:"Jiji's To-Do",ri:'🐟',rl:'Fish',pi:'🎀',pl:'Pet',yi:'✨',yl:'Magic',tl:'Fish:',speed:.68,
    img:{
      neutral:   'jijineutral.png',
      waiting:   'jijiannoyed.png',
      greeting:  'jijiwaiting.png',
      taskdone:  'jijihappy.png',
      celebrate: 'jijihappy.png',
      idle:      'jijisleepy.png',
      sleeping:  'jijisleepy.png'
    },
    bubbles:["...well?","still nothing. 😒","I'm waiting.","*stares* ✨","tasks exist. do them."]
  }
};

/* pixel dims: {w, h} for each image at display scale */
var DIMS = {
  'totoroneutral.png':    {w:184,h:155},
  'totorohai.png':        {w:136,h:155},
  'totorostare.png':      {w:137,h:155},
  'totoroexcited.png':    {w:220,h:138}, /* wide — arms out */
  'totorojump.png':       {w:180,h:155},
  'duckneurtral.png':     {w:134,h:150},
  'duckhappy.png':        {w:145,h:150},
  'duckhi.png':           {w:139,h:150},
  'duckcry.png':          {w:149,h:150},
  'duckgoingtosleep.png': {w:185,h:132},
  'ducksleep.png':        {w:171,h:120},
  'jijineutral.png':      {w:126,h:155},
  'jijihappy.png':        {w:188,h:145},
  'jijiannoyed.png':      {w:169,h:148},
  'jijisleepy.png':       {w:183,h:130},
  'jijiwaiting.png':      {w:142,h:148}
};

/* sleep animation type per character */
var SLEEP_CLASS = {totoro:'sleeping', chibi:'sleep-flat', jiji:'sleep-flat'};

/* ── state ───────────────────────────────────────────────────────── */
var sel=null, tasks=[], rewards=0, walkPct=0, feedPct=0;
var cstate='walking', appMode='neutral';
var charX=18, dir=1, speed=.6, charW=150, charH=150;
var rafId=null, idleT=null, deepT=null, bubbleT=null, bubbleHideT=null;
var inAction=false; /* true while eating/petting/playing/taskdone */

/* ── init ────────────────────────────────────────────────────────── */
function init(){
  sel=localStorage.getItem('ghibli-char');
  if(sel&&CHARS[sel]) startApp(sel);
  preloadAll();
}

function preloadAll(){
  Object.keys(DIMS).forEach(function(f){var i=new Image();i.src=f;});
}

window.selectChar=function(k){
  sel=k;localStorage.setItem('ghibli-char',k);
  var s=document.getElementById('sel-screen');
  s.classList.add('hide');
  setTimeout(function(){s.style.display='none';},500);
  startApp(k);
};

window.showSelection=function(){
  stopWalk();clearIdle();clearBubble();
  document.getElementById('app').classList.remove('visible');
  var s=document.getElementById('sel-screen');
  s.style.display='flex';s.classList.remove('hide');
};

function startApp(k){
  var c=CHARS[k], app=document.getElementById('app');
  app.setAttribute('data-char',k);
  app.classList.add('visible');
  document.getElementById('app-title').textContent=c.title;
  document.getElementById('ri0').textContent=c.ri;
  document.getElementById('rl0').textContent=c.rl;
  document.getElementById('ri1').textContent=c.pi;
  document.getElementById('rl1').textContent=c.pl;
  document.getElementById('ri2').textContent=c.yi;
  document.getElementById('rl2').textContent=c.yl;
  document.getElementById('tally-icon').textContent=c.ri;
  document.getElementById('tally-lbl').textContent=c.tl;
  speed=c.speed;
  tasks=JSON.parse(localStorage.getItem('g-tasks-'+k)||'[]');
  rewards=parseInt(localStorage.getItem('g-rew-'+k)||'0');
  charX=18; dir=1;
  document.getElementById('char-flip').classList.remove('facing-left');
  renderTasks(); recalcMeters(); updateUI();

  /* morning greeting OR context-appropriate state */
  var hr=new Date().getHours();
  var todayKey='g-greeted-'+k+'-'+new Date().toDateString();
  if(!localStorage.getItem(todayKey) && hr>=6 && hr<11){
    localStorage.setItem(todayKey,'1');
    showGreeting();
  } else {
    startContextWalk();
  }
}

/* ── context logic ───────────────────────────────────────────────── */
function getContextMode(){
  var incomplete=tasks.filter(function(t){return !t.done;}).length;
  return incomplete>0 ? 'waiting' : 'neutral';
}

function startContextWalk(){
  appMode=getContextMode();
  setImg(appMode);
  startWalk();
  if(appMode==='waiting') scheduleBubble();
}

function showGreeting(){
  appMode='greeting';
  setImg('greeting');
  cstate='sitting'; applyState();
  stopWalk();
  setTimeout(function(){
    startContextWalk();
  }, 3800);
}

/* ── image control ───────────────────────────────────────────────── */
function setImg(mode){
  var filename=CHARS[sel].img[mode]||CHARS[sel].img.neutral;
  var d=DIMS[filename]||{w:150,h:150};
  var img=document.getElementById('char-img');
  img.src=filename;
  img.style.width=d.w+'px';
  img.style.height=d.h+'px';
  document.getElementById('char-pos').style.width=d.w+'px';
  charW=d.w; charH=d.h;
}

/* ── walk engine ─────────────────────────────────────────────────── */
function maxX(){var s=document.getElementById('char-stage');return s?s.offsetWidth-charW-6:220;}
function applyDir(){var f=document.getElementById('char-flip');dir<0?f.classList.add('facing-left'):f.classList.remove('facing-left');}
function applyState(){document.getElementById('char-pos').className=cstate;}
function step(){
  charX+=dir*speed;
  var mx=maxX();
  if(charX>=mx){charX=mx;dir=-1;applyDir();}
  if(charX<=0) {charX=0; dir=1; applyDir();}
  document.getElementById('char-pos').style.left=charX+'px';
  updateBubblePos();
  rafId=requestAnimationFrame(step);
}
function startWalk(){
  stopWalk();cstate='walking';applyState();
  rafId=requestAnimationFrame(step);
  resetIdle();
}
function stopWalk(){if(rafId){cancelAnimationFrame(rafId);rafId=null;}}
function resetIdle(){clearIdle();idleT=setTimeout(goIdle,40000);deepT=setTimeout(goDeepSleep,65000);}
function clearIdle(){clearTimeout(idleT);clearTimeout(deepT);idleT=deepT=null;removeZzz();}
function removeZzz(){var z=document.querySelector('.zzz-el');if(z)z.remove();}

function goIdle(){
  if(inAction)return;
  stopWalk();clearBubble();
  appMode='idle'; setImg('idle');
  cstate='sitting'; applyState();
  deepT=setTimeout(goDeepSleep,25000);
}
function goDeepSleep(){
  if(inAction)return;
  removeZzz();
  document.getElementById('char-flip').classList.remove('facing-left');
  appMode='sleeping'; setImg('sleeping');
  cstate=SLEEP_CLASS[sel]; applyState();
  spawnZzz();
  if(cstate==='sleeping'){
    setTimeout(function(){cstate='sleep-deep';applyState();},1800);
  }
}
function wake(){
  clearIdle(); clearBubble();
  if(cstate!=='walking') startContextWalk();
}

/* ── speech bubble ───────────────────────────────────────────────── */
function scheduleBubble(){
  clearBubble();
  var delay=18000+Math.random()*12000;
  bubbleT=setTimeout(showBubble, delay);
}
function showBubble(){
  if(appMode!=='waiting'||cstate!=='walking')return;
  var msgs=CHARS[sel].bubbles;
  var txt=msgs[Math.floor(Math.random()*msgs.length)];
  var el=document.getElementById('bubble-txt');
  var bub=document.getElementById('speech-bubble');
  el.textContent=txt;
  updateBubblePos();
  bub.classList.add('visible');
  bubbleHideT=setTimeout(function(){
    bub.classList.remove('visible');
    if(appMode==='waiting') scheduleBubble();
  },3200);
}
function clearBubble(){
  clearTimeout(bubbleT); clearTimeout(bubbleHideT); bubbleT=bubbleHideT=null;
  document.getElementById('speech-bubble').classList.remove('visible');
}
function updateBubblePos(){
  var bub=document.getElementById('speech-bubble');
  if(!bub.classList.contains('visible'))return;
  var bw=bub.offsetWidth||100;
  var stage=document.getElementById('char-stage');
  var sw=stage?stage.offsetWidth:360;
  var left=charX+charW/2-bw/2;
  left=Math.max(8,Math.min(left,sw-bw-8));
  bub.style.left=left+'px';
  bub.style.bottom=(charH+24)+'px';
}

/* ── reward actions ──────────────────────────────────────────────── */
window.doSnack=function(){
  if(rewards<=0)return;
  rewards--; save(); updateUI();
  inAction=true; wake();
  clearBubble();
  cstate='eating'; setImg('taskdone'); applyState();
  spawnFloat(CHARS[sel].ri);
  setTimeout(function(){inAction=false;startContextWalk();},2200);
};
window.doPet=function(){
  inAction=true; wake(); clearBubble();
  cstate='petting'; setImg('taskdone'); applyState();
  spawnFloat('💕');
  setTimeout(function(){inAction=false;startContextWalk();},2800);
};
window.doPlay=function(){
  inAction=true; wake(); clearBubble();
  cstate='playing'; setImg('celebrate'); applyState();
  spawnFloat(CHARS[sel].yi);
  setTimeout(function(){inAction=false;startContextWalk();},2400);
};

function spawnFloat(e){
  var s=document.getElementById('char-stage');if(!s)return;
  var el=document.createElement('div');el.className='float-el';
  el.textContent=e;
  el.style.left=(charX+Math.random()*charW*.6+charW*.2)+'px';
  el.style.bottom=(charH*.6+Math.random()*20)+'px';
  s.appendChild(el);
  setTimeout(function(){el.remove();},1500);
}

function spawnZzz(){
  var s=document.getElementById('char-stage');if(!s)return;
  var z=document.createElement('div');z.className='zzz-el';
  z.textContent='z z z';
  z.style.left=(charX+charW*.55)+'px';
  z.style.bottom=(charH*.75)+'px';
  s.appendChild(z);
}

function updateUI(){
  var c=document.getElementById('snack-ct');if(c)c.textContent='×'+rewards;
  var b=document.getElementById('btn-snack');if(b)b.disabled=(rewards===0);
  var tot=parseInt(localStorage.getItem('g-rtot-'+sel)||'0');
  var tv=document.getElementById('tally-total');if(tv)tv.textContent=tot;
}

/* ── tasks ───────────────────────────────────────────────────────── */
window.addTask=function(){
  var inp=document.getElementById('task-inp'),ts=document.getElementById('tag-sel');
  var txt=inp.value.trim();if(!txt)return;
  wake();
  tasks.push({id:Date.now(),text:txt,tag:ts.value,done:false});
  inp.value=''; ts.value='none';
  save(); renderTasks(); recalcMeters();
  /* switching from neutral→waiting if this is first task */
  if(appMode==='neutral'&&!inAction){appMode='waiting';setImg('waiting');scheduleBubble();}
};

window.toggleTask=function(id){
  var t=tasks.find(function(x){return x.id===id;});if(!t)return;
  t.done=!t.done;
  if(t.done){
    if(t.tag==='walk')walkPct=Math.min(100,walkPct+20);
    if(t.tag==='feed')feedPct=Math.min(100,feedPct+20);
    rewards++;
    var tk='g-rtot-'+sel;
    localStorage.setItem(tk,parseInt(localStorage.getItem(tk)||'0')+1);
    onTaskComplete();
  }else{
    if(t.tag==='walk')walkPct=Math.max(0,walkPct-20);
    if(t.tag==='feed')feedPct=Math.max(0,feedPct-20);
    rewards=Math.max(0,rewards-1);
    /* recheck mode if unchecking re-adds incomplete tasks */
    if(!inAction){ appMode=getContextMode(); setImg(appMode); }
  }
  save(); renderTasks(); updateMeters(); updateUI();
};

function onTaskComplete(){
  inAction=true; clearBubble();
  cstate='taskdone';
  var allDone=tasks.length>0&&tasks.filter(function(t){return !t.done;}).length===0;
  setImg(allDone?'celebrate':'taskdone');
  applyState();
  spawnFloat(CHARS[sel].ri);
  /* if all tasks done, stop walking and do a little celebration */
  if(allDone){
    stopWalk();
    setTimeout(function(){
      inAction=false; appMode='neutral'; setImg('neutral'); startWalk();
    },2800);
  }else{
    setTimeout(function(){
      inAction=false; appMode=getContextMode(); setImg(appMode);
      if(appMode==='waiting') scheduleBubble();
    },2400);
  }
}

window.deleteTask=function(id){
  tasks=tasks.filter(function(t){return t.id!==id;});
  save(); renderTasks(); recalcMeters();
  if(!inAction){appMode=getContextMode();setImg(appMode);if(appMode==='neutral')clearBubble();}
};

function save(){
  localStorage.setItem('g-tasks-'+sel,JSON.stringify(tasks));
  localStorage.setItem('g-rew-'+sel,rewards);
}
function recalcMeters(){
  var wd=tasks.filter(function(t){return t.tag==='walk'&&t.done;}).length;
  var wt=tasks.filter(function(t){return t.tag==='walk';}).length;
  var fd=tasks.filter(function(t){return t.tag==='feed'&&t.done;}).length;
  var ft=tasks.filter(function(t){return t.tag==='feed';}).length;
  walkPct=wt>0?Math.round(wd/wt*100):0;
  feedPct=ft>0?Math.round(fd/ft*100):0;
  updateMeters();
}
function updateMeters(){
  var wf=document.getElementById('walk-fill'),ff=document.getElementById('feed-fill');
  var wp=document.getElementById('walk-pct'),fp=document.getElementById('feed-pct');
  if(wf)wf.style.width=walkPct+'%';if(ff)ff.style.width=feedPct+'%';
  if(wp)wp.textContent=walkPct+'%';if(fp)fp.textContent=feedPct+'%';
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function renderTasks(){
  var l=document.getElementById('task-list');if(!l)return;
  if(!tasks.length){l.innerHTML='<div class="empty-state">No tasks yet — add one above!</div>';return;}
  l.innerHTML=tasks.map(function(t){
    var tag=t.tag!=='none'?'<span class="task-tag">'+(t.tag==='walk'?'🐾 Walk':'🍃 Feed')+'</span>':'';
    return '<div class="task-item'+(t.done?' done':'')+'">'+
      '<input type="checkbox" class="task-cb"'+(t.done?' checked':'')+' onchange="toggleTask('+t.id+')">'+
      '<span class="task-txt">'+esc(t.text)+'</span>'+tag+
      '<button class="task-del" onclick="deleteTask('+t.id+')">×</button></div>';
  }).join('');
}

init();
})();
</script>
</body>
</html>
